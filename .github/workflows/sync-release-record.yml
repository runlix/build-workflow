name: CI Sync Release Record

on:
  workflow_call:
    inputs:
      tool-image:
        description: Immutable planner image reference pinned to a build-workflow digest or sha tag.
        required: true
        type: string
    secrets:
      RUNLIX_APP_ID:
        description: GitHub App ID used for sync PR creation and merge on protected main.
        required: true
      RUNLIX_PRIVATE_KEY:
        description: GitHub App private key used for sync PR creation and merge on protected main.
        required: true

jobs:
  validate-inputs:
    name: validate-inputs
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    outputs:
      tool_image: ${{ steps.tool-image.outputs.value }}
    steps:
      - name: Validate tool image reference
        id: tool-image
        shell: bash
        env:
          TOOL_IMAGE: ${{ inputs.tool-image }}
        run: |
          set -euo pipefail

          if ! grep -Eq '^ghcr\.io/runlix/build-workflow-tools(@sha256:[0-9a-f]{64}|:sha-[0-9a-f]{40})$' <<< "$TOOL_IMAGE"; then
            echo "tool-image must be ghcr.io/runlix/build-workflow-tools pinned by digest or :sha-<40-char git sha>" >&2
            exit 1
          fi

          printf 'value=%s\n' "$TOOL_IMAGE" >> "$GITHUB_OUTPUT"

  render-release-json:
    needs: validate-inputs
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: render-release-json
    permissions:
      actions: read
    runs-on: ubuntu-24.04
    container:
      image: ${{ needs.validate-inputs.outputs.tool_image }}
    steps:
      - name: Verify triggering workflow provenance
        shell: bash
        env:
          TRIGGER_WORKFLOW: ${{ github.event.workflow_run.name }}
          TRIGGER_BRANCH: ${{ github.event.workflow_run.head_branch }}
          TRIGGER_REPOSITORY: ${{ github.event.workflow_run.repository.full_name }}
          CURRENT_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          [ "$TRIGGER_WORKFLOW" = "Release" ] || {
            echo "Unexpected triggering workflow: $TRIGGER_WORKFLOW" >&2
            exit 1
          }

          [ "$TRIGGER_BRANCH" = "release" ] || {
            echo "Unexpected triggering branch: $TRIGGER_BRANCH" >&2
            exit 1
          }

          [ "$TRIGGER_REPOSITORY" = "$CURRENT_REPOSITORY" ] || {
            echo "Unexpected triggering repository: $TRIGGER_REPOSITORY" >&2
            exit 1
          }

      - name: Download release record artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-record
          path: artifacts
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Validate release record
        shell: bash
        run: |
          set -euo pipefail
          build-workflow-ci validate-release-record artifacts/release-record.json

      - name: Verify record SHA matches triggering workflow
        shell: bash
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          record_sha="$(jq -r '.sha' artifacts/release-record.json)"
          [ "$record_sha" = "$HEAD_SHA" ] || {
            echo "Release record SHA does not match triggering workflow SHA" >&2
            exit 1
          }

      - name: Write release.json
        shell: bash
        run: |
          set -euo pipefail
          build-workflow-ci write-release-json artifacts/release-record.json --output release.json

      - name: Validate release.json
        shell: bash
        run: |
          set -euo pipefail
          build-workflow-ci validate-release-record release.json

      - name: Upload normalized release.json artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: normalized-release-json
          path: release.json

  commit-release-json:
    name: commit-release-json
    needs: render-release-json
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RUNLIX_APP_ID }}
          private-key: ${{ secrets.RUNLIX_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout metadata branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - name: Download normalized release.json artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: normalized-release-json
          path: ${{ runner.temp }}/normalized-release-json

      - name: Stage metadata update on sync branch
        id: sync-branch
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_JSON_DIR: ${{ runner.temp }}/normalized-release-json
          SERVICE_NAME: ${{ github.event.repository.name }}
          SYNC_BRANCH: automation/sync-release-record
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          export GH_TOKEN="$APP_TOKEN"
          gh auth setup-git

          git fetch --no-tags origin main
          git switch -C "$SYNC_BRANCH" origin/main

          cp "$RELEASE_JSON_DIR/release.json" release.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release.json

          if git diff --staged --quiet; then
            echo "No metadata changes to commit"
            printf 'has_changes=false\n' >> "$GITHUB_OUTPUT"
            printf 'sync_branch=%s\n' "$SYNC_BRANCH" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="$(jq -r '.version // ""' release.json)"
          short_sha="$(jq -r '.short_sha' release.json)"

          if [ -n "$version" ]; then
            commit_title="Release: ${SERVICE_NAME} ${version} @ ${short_sha}"
          else
            commit_title="Release: ${SERVICE_NAME} @ ${short_sha}"
          fi

          git commit -m "$commit_title"
          git push --force-with-lease origin "HEAD:${SYNC_BRANCH}"

          printf 'has_changes=true\n' >> "$GITHUB_OUTPUT"
          printf 'sync_branch=%s\n' "$SYNC_BRANCH" >> "$GITHUB_OUTPUT"
          printf 'commit_sha=%s\n' "$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          printf 'commit_title=%s\n' "$commit_title" >> "$GITHUB_OUTPUT"

      - name: Close stale sync PR
        if: ${{ steps.sync-branch.outputs.has_changes != 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SYNC_BRANCH: ${{ steps.sync-branch.outputs.sync_branch }}
        shell: bash
        run: |
          set -euo pipefail

          pr_number="$(gh pr list --base main --head "$SYNC_BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [ -z "$pr_number" ]; then
            echo "No open sync PR to close"
            exit 0
          fi

          gh pr close "$pr_number" --comment "Closing stale sync PR because \`release.json\` already matches \`main\`."

      - name: Create or update sync PR
        id: sync-pr
        if: ${{ steps.sync-branch.outputs.has_changes == 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          COMMIT_TITLE: ${{ steps.sync-branch.outputs.commit_title }}
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
          SOURCE_WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
          SYNC_BRANCH: ${{ steps.sync-branch.outputs.sync_branch }}
        shell: bash
        run: |
          set -euo pipefail

          body_file="${RUNNER_TEMP}/sync-pr-body.md"
          {
            echo "Automated update of \`release.json\` from a successful \`${SOURCE_WORKFLOW_NAME}\` run."
            echo ""
            echo "- Source workflow run: https://github.com/${{ github.repository }}/actions/runs/${SOURCE_RUN_ID}"
            echo "- Source commit: \`${SOURCE_SHA}\`"
            echo "- Sync branch: \`${SYNC_BRANCH}\`"
          } > "$body_file"

          pr_number="$(gh pr list --base main --head "$SYNC_BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --title "$COMMIT_TITLE" --body-file "$body_file"
          else
            gh pr create --base main --head "$SYNC_BRANCH" --title "$COMMIT_TITLE" --body-file "$body_file" > /dev/null
            pr_number="$(gh pr list --base main --head "$SYNC_BRANCH" --state open --json number --jq '.[0].number // empty')"
          fi

          [ -n "$pr_number" ] || {
            echo "Failed to resolve sync PR number" >&2
            exit 1
          }

          printf 'number=%s\n' "$pr_number" >> "$GITHUB_OUTPUT"
          printf 'url=%s\n' "$(gh pr view "$pr_number" --json url --jq '.url')" >> "$GITHUB_OUTPUT"

      - name: Enable sync PR merge
        if: ${{ steps.sync-branch.outputs.has_changes == 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          COMMIT_SHA: ${{ steps.sync-branch.outputs.commit_sha }}
          PR_NUMBER: ${{ steps.sync-pr.outputs.number }}
        shell: bash
        run: |
          set -euo pipefail

          auto_merge_enabled="$(gh pr view "$PR_NUMBER" --json autoMergeRequest --jq '.autoMergeRequest != null')"
          if [ "$auto_merge_enabled" = "true" ]; then
            echo "Sync PR auto-merge is already enabled"
            exit 0
          fi

          gh pr merge "$PR_NUMBER" --auto --merge --delete-branch --match-head-commit "$COMMIT_SHA"

      - name: Summarize sync PR state
        shell: bash
        env:
          HAS_CHANGES: ${{ steps.sync-branch.outputs.has_changes }}
          PR_NUMBER: ${{ steps.sync-pr.outputs.number }}
          PR_URL: ${{ steps.sync-pr.outputs.url }}
          SYNC_BRANCH: ${{ steps.sync-branch.outputs.sync_branch }}
        run: |
          set -euo pipefail

          {
            echo "## Sync PR"
            echo ""
            echo "- Sync branch: \`$SYNC_BRANCH\`"
            if [ "$HAS_CHANGES" = "true" ]; then
              echo "- PR: [#$PR_NUMBER]($PR_URL)"
              echo "- Merge mode: \`merge\` via bot-authored pull request"
            else
              echo "- Result: \`release.json\` already matched \`main\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
