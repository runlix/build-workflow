name: CI Sync Release Record

on:
  workflow_call:
    inputs:
      tool-image:
        description: Immutable planner image reference pinned to a build-workflow digest or sha tag.
        required: true
        type: string

jobs:
  validate-inputs:
    name: validate-inputs
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    outputs:
      tool_image: ${{ steps.tool-image.outputs.value }}
    steps:
      - name: Validate tool image reference
        id: tool-image
        shell: bash
        env:
          TOOL_IMAGE: ${{ inputs.tool-image }}
        run: |
          set -euo pipefail

          if ! grep -Eq '^ghcr\.io/runlix/build-workflow-tools(@sha256:[0-9a-f]{64}|:sha-[0-9a-f]{40})$' <<< "$TOOL_IMAGE"; then
            echo "tool-image must be ghcr.io/runlix/build-workflow-tools pinned by digest or :sha-<40-char git sha>" >&2
            exit 1
          fi

          printf 'value=%s\n' "$TOOL_IMAGE" >> "$GITHUB_OUTPUT"

  render-release-json:
    needs: validate-inputs
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: render-release-json
    permissions:
      actions: read
    runs-on: ubuntu-24.04
    container:
      image: ${{ needs.validate-inputs.outputs.tool_image }}
    steps:
      - name: Verify triggering workflow provenance
        shell: bash
        env:
          TRIGGER_WORKFLOW: ${{ github.event.workflow_run.name }}
          TRIGGER_BRANCH: ${{ github.event.workflow_run.head_branch }}
          TRIGGER_REPOSITORY: ${{ github.event.workflow_run.repository.full_name }}
          CURRENT_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          [ "$TRIGGER_WORKFLOW" = "Release" ] || {
            echo "Unexpected triggering workflow: $TRIGGER_WORKFLOW" >&2
            exit 1
          }

          [ "$TRIGGER_BRANCH" = "release" ] || {
            echo "Unexpected triggering branch: $TRIGGER_BRANCH" >&2
            exit 1
          }

          [ "$TRIGGER_REPOSITORY" = "$CURRENT_REPOSITORY" ] || {
            echo "Unexpected triggering repository: $TRIGGER_REPOSITORY" >&2
            exit 1
          }

      - name: Download release record artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-record
          path: artifacts
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Validate release record
        shell: bash
        run: |
          set -euo pipefail
          build-workflow-ci validate-release-record artifacts/release-record.json

      - name: Verify record SHA matches triggering workflow
        shell: bash
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          record_sha="$(jq -r '.sha' artifacts/release-record.json)"
          [ "$record_sha" = "$HEAD_SHA" ] || {
            echo "Release record SHA does not match triggering workflow SHA" >&2
            exit 1
          }

      - name: Write release.json
        shell: bash
        run: |
          set -euo pipefail
          build-workflow-ci write-release-json artifacts/release-record.json --output release.json

      - name: Validate release.json
        shell: bash
        run: |
          set -euo pipefail
          build-workflow-ci validate-release-record release.json

      - name: Upload normalized release.json artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: normalized-release-json
          path: release.json

  commit-release-json:
    name: commit-release-json
    needs: render-release-json
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout metadata branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          persist-credentials: true

      - name: Download normalized release.json artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: normalized-release-json
          path: ${{ runner.temp }}/normalized-release-json

      - name: Commit metadata update
        env:
          RELEASE_JSON_DIR: ${{ runner.temp }}/normalized-release-json
          SERVICE_NAME: ${{ github.event.repository.name }}
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          cp "$RELEASE_JSON_DIR/release.json" release.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release.json

          if git diff --staged --quiet; then
            echo "No metadata changes to commit"
            exit 0
          fi

          version="$(jq -r '.version // ""' release.json)"
          short_sha="$(jq -r '.short_sha' release.json)"

          if [ -n "$version" ]; then
            git commit -m "Release: ${SERVICE_NAME} ${version} @ ${short_sha}"
          else
            git commit -m "Release: ${SERVICE_NAME} @ ${short_sha}"
          fi

          git push origin HEAD:main
