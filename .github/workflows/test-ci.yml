name: Test CI Workflows

on:
  pull_request:
    paths:
      - 'renovate.json'
      - 'tools/ci/**'
      - '.github/workflows/build-images-rebuild.yml'
      - '.github/workflows/test-workflow.yml'
      - '.github/workflows/validate.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/validate-release-json.yml'
      - '.github/workflows/publish-tool-image.yml'
      - '.github/workflows/test-ci.yml'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'docs/ci.md'
      - 'docs/ci/**'
      - 'docs/v1/README.md'
      - 'examples/ci/**'
      - 'examples/v1/**'
      - 'examples/wrappers/**'
      - 'schema/ci-config.schema.json'
      - 'schema/release-json.schema.json'
      - 'test-fixtures/ci/**'
      - 'test-fixtures/v1/**'
  push:
    branches:
      - main
    paths:
      - 'renovate.json'
      - 'tools/ci/**'
      - '.github/workflows/build-images-rebuild.yml'
      - '.github/workflows/test-workflow.yml'
      - '.github/workflows/validate.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/validate-release-json.yml'
      - '.github/workflows/publish-tool-image.yml'
      - '.github/workflows/test-ci.yml'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'docs/ci.md'
      - 'docs/ci/**'
      - 'docs/v1/README.md'
      - 'examples/ci/**'
      - 'examples/v1/**'
      - 'examples/wrappers/**'
      - 'schema/ci-config.schema.json'
      - 'schema/release-json.schema.json'
      - 'test-fixtures/ci/**'
      - 'test-fixtures/v1/**'
  workflow_dispatch:

concurrency:
  group: test-ci-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FIXTURE_TOOL_IMAGE: ghcr.io/runlix/build-workflow-tools@sha256:19bd7aafbb7cc022df4bb37cffb62d00336e5986928bb3b5eee62ca80ca0201d

jobs:
  validate-ci-contracts:
    name: validate-ci-contracts
    outputs:
      fixture_tool_image: ${{ steps.fixture-tool-image.outputs.value }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Export fixture tool image
        id: fixture-tool-image
        shell: bash
        env:
          FIXTURE_TOOL_IMAGE: ${{ env.FIXTURE_TOOL_IMAGE }}
        run: |
          set -euo pipefail
          printf 'value=%s\n' "$FIXTURE_TOOL_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Install test dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user -r tools/ci/requirements.txt

      - name: Validate schema structure
        shell: bash
        run: |
          set -euo pipefail

          tools/ci/bin/build-workflow-ci validate-schema-file schema/ci-config.schema.json
          tools/ci/bin/build-workflow-ci validate-schema-file schema/release-json.schema.json

      - name: Validate examples and fixtures
        shell: bash
        run: |
          set -euo pipefail

          for file in \
            examples/ci/base-image-config.json \
            examples/ci/service-config.json
          do
            tools/ci/bin/build-workflow-ci validate-config-payload "$file"
          done

          for file in \
            test-fixtures/ci/base-image/.ci/config.json \
            test-fixtures/ci/service/.ci/config.json
          do
            tools/ci/bin/build-workflow-ci validate-config "$file" > /dev/null
          done

          tools/ci/bin/build-workflow-ci validate-release-json test-fixtures/ci/release-json/release.json

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          python3 -m unittest discover -s tools/ci/tests -p 'test_*.py'

      - name: Validate docs navigation and contract names
        shell: bash
        run: |
          set -euo pipefail

          grep -Fq '[docs/ci.md](./docs/ci.md)' README.md
          grep -Fq '[docs/ci/](./docs/ci/)' README.md

          for page in architecture usage workflow-behavior api-reference testing-and-maintenance troubleshooting; do
            test -f "docs/ci/${page}.md"
            grep -Fq "./ci/${page}.md" docs/ci.md
          done

          grep -Fq '[../ci.md](../ci.md)' docs/v1/README.md
          grep -Fq 'docs/ci/' CONTRIBUTING.md

          if rg -n 'sync-release-record|validate-sync-wrapper|release-record' README.md docs/ci.md docs/ci/ .github/workflows/test-ci.yml; then
            echo "Legacy sync or release-record references remain in v2 docs" >&2
            exit 1
          fi

          grep -Fq 'release.yml' docs/ci/workflow-behavior.md
          grep -Fq 'validate-release-json.yml' docs/ci/workflow-behavior.md
          grep -Fq 'release.json' docs/ci/workflow-behavior.md
          grep -Fq 'planner/executor split' docs/ci/architecture.md
          grep -Fq 'publish: false' docs/ci/usage.md
          grep -Fq 'distroless-runtime' docs/ci/testing-and-maintenance.md

      - name: Run direct CLI smoke tests
        shell: bash
        run: |
          set -euo pipefail

          tools/ci/bin/build-workflow-ci validate-config test-fixtures/ci/service/.ci/config.json > /tmp/validate.json
          jq -e '.image_name == "ghcr.io/runlix/test-service"' /tmp/validate.json > /dev/null
          jq -e '.context_dir == "test-fixtures/ci/service"' /tmp/validate.json > /dev/null

          tools/ci/bin/build-workflow-ci \
            plan-matrix test-fixtures/ci/service/.ci/config.json \
            --short-sha 1234567 \
            > /tmp/matrix.json
          jq -e 'length == 2' /tmp/matrix.json > /dev/null
          jq -e '.[0].manifest_tag != null' /tmp/matrix.json > /dev/null

          tools/ci/bin/build-workflow-ci \
            plan-build-target test-fixtures/ci/service/.ci/config.json \
            --target-name stable-amd64 \
            --mode pr \
            --short-sha 1234567 \
            > /tmp/build-target.json
          jq -e '.image_tag == "ghcr.io/runlix/test-service:pr-1234567-stable-amd64"' /tmp/build-target.json > /dev/null
          jq -e '.build_args.BASE_REF != null' /tmp/build-target.json > /dev/null

          tools/ci/bin/build-workflow-ci \
            plan-manifests test-fixtures/ci/service/.ci/config.json \
            --short-sha 1234567 \
            > /tmp/manifests.json
          jq -e '.[0].refs | length > 0' /tmp/manifests.json > /dev/null
          jq -e '.[0].platforms[0] == "linux/amd64"' /tmp/manifests.json > /dev/null

          tools/ci/bin/build-workflow-ci \
            render-release-json test-fixtures/ci/service/.ci/config.json \
            --source-sha 1234567890abcdef1234567890abcdef12345678 \
            --published-at 2026-03-17T12:00:00Z \
            --manifests-path test-fixtures/ci/release-json/manifests.json \
            > /tmp/release.json

          tools/ci/bin/build-workflow-ci validate-release-json /tmp/release.json
          diff -u test-fixtures/ci/release-json/release.json /tmp/release.json

          tools/ci/bin/build-workflow-ci \
            render-telegram-notification test-fixtures/ci/release-json/release.json \
            --repository runlix/test-service \
            --server-url https://github.com \
            --run-id 123456 \
            > /tmp/telegram-message.txt
          grep -F "*Version:* \`1.2.3\`" /tmp/telegram-message.txt > /dev/null
          grep -F "*Registry:*" /tmp/telegram-message.txt > /dev/null

      - name: Build local tool image
        shell: bash
        run: |
          set -euo pipefail
          docker build -f tools/ci/Dockerfile -t build-workflow-tools:test .

      - name: Run tool image smoke tests
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm \
            --entrypoint bash \
            -v "$PWD:/workspace" \
            -w /workspace \
            build-workflow-tools:test \
            --noprofile --norc -e -o pipefail -c 'command -v build-workflow-ci >/dev/null && build-workflow-ci validate-config test-fixtures/ci/base-image/.ci/config.json' \
            > /tmp/container-validate.json

          jq -e '.enabled_count == 2' /tmp/container-validate.json > /dev/null

          docker run --rm \
            --entrypoint bash \
            -v "$PWD:/workspace" \
            -w /workspace \
            build-workflow-tools:test \
            --noprofile --norc -e -o pipefail -c 'command -v build-workflow-ci >/dev/null && build-workflow-ci render-release-json test-fixtures/ci/service/.ci/config.json --source-sha 1234567890abcdef1234567890abcdef12345678 --published-at 2026-03-17T12:00:00Z --manifests-path test-fixtures/ci/release-json/manifests.json' \
            > /tmp/container-release.json

          diff -u test-fixtures/ci/release-json/release.json /tmp/container-release.json

      - name: Verify public workflow contract
        shell: bash
        run: |
          set -euo pipefail

          expected_app_token_action_sha='f8d387b68d61c58ab83c6c016672934102569859'
          expected_attest_action_sha='977bb373ede98d70efdf65b84cb5f73e068dcc2a'

          test -f .github/workflows/validate.yml
          test -f .github/workflows/release.yml
          test -f .github/workflows/validate-release-json.yml
          test ! -e .github/workflows/sync-release-record.yml
          test ! -e .github/workflows/validate-sync-wrapper.yml
          test ! -e examples/wrappers/sync-release-record.yml
          test ! -e test-fixtures/ci/sync-wrapper/sync-release-record.yml
          test ! -e schema/release-record.schema.json

          if grep -InE 'sync-release-record|validate-sync-wrapper|release-record' \
            .github/workflows/validate.yml \
            .github/workflows/release.yml \
            .github/workflows/validate-release-json.yml \
            examples/wrappers/release.yml \
            examples/wrappers/validate-main.yml
          then
            echo "Legacy sync or release-record references remain in the public v2 contract" >&2
            exit 1
          fi

          grep -Eq "actions/create-github-app-token@${expected_app_token_action_sha}" .github/workflows/release.yml
          grep -Eq "actions/attest-build-provenance@${expected_attest_action_sha}" .github/workflows/release.yml
          grep -Eq '^      RUNLIX_APP_ID:$' .github/workflows/release.yml
          grep -Eq '^      RUNLIX_PRIVATE_KEY:$' .github/workflows/release.yml
          grep -Eq '^      TELEGRAM_BOT_TOKEN:$' .github/workflows/release.yml
          grep -Eq '^      TELEGRAM_CHAT_ID:$' .github/workflows/release.yml
          test "$(grep -Ec '^[[:space:]]+--entrypoint build-workflow-ci[[:space:]]*\\$' .github/workflows/release.yml)" -eq 4
          grep -Eq 'plan-build-target "\$CONFIG_PATH"' .github/workflows/release.yml
          grep -Eq 'render-release-json "\$CONFIG_PATH"' .github/workflows/release.yml
          grep -Eq 'validate-release-json release.json' .github/workflows/release.yml
          grep -Eq 'render-telegram-notification "\$RELEASE_JSON_PATH"' .github/workflows/release.yml
          grep -Eq '^      attestations: write$' .github/workflows/release.yml
          grep -Eq '^      id-token: write$' .github/workflows/release.yml
          grep -Eq 'gh pr merge "\$PR_NUMBER" --auto --merge --delete-branch --match-head-commit "\$COMMIT_SHA"' .github/workflows/release.yml

          grep -Eq 'build-workflow-ci validate-release-json "\$RELEASE_JSON_PATH"' .github/workflows/validate-release-json.yml

          grep -Eq '^  attestations: write$' examples/wrappers/release.yml
          grep -Eq '^  id-token: write$' examples/wrappers/release.yml
          grep -Eq '^      RUNLIX_APP_ID: ' examples/wrappers/release.yml
          grep -Eq '^      RUNLIX_PRIVATE_KEY: ' examples/wrappers/release.yml
          grep -Eq '^name: Validate Main$' examples/wrappers/validate-main.yml
          grep -Eq '^    paths:$' examples/wrappers/validate-main.yml
          grep -Eq '^      - "release\.json"$' examples/wrappers/validate-main.yml
          grep -Eq 'uses: runlix/build-workflow/.github/workflows/validate-release-json.yml@YOUR_BUILD_WORKFLOW_SHA' examples/wrappers/validate-main.yml

          grep -Eq '^  FIXTURE_TOOL_IMAGE: ghcr\.io/runlix/build-workflow-tools@sha256:[0-9a-f]{64}$' .github/workflows/test-ci.yml
          grep -Eq "schema/release-json\\.schema\\.json" .github/workflows/publish-tool-image.yml
          grep -Eq '^[[:space:]]+- main$' .github/workflows/publish-tool-image.yml
          if grep -Eq '^[[:space:]]+- side/\*\*$|^[[:space:]]+- refactor/\*\*$' .github/workflows/publish-tool-image.yml; then
            echo "Standalone tool-image publish still auto-runs on side or refactor branches" >&2
            exit 1
          fi

  test-ci-base-image:
    name: test-ci-base-image
    needs: validate-ci-contracts
    uses: ./.github/workflows/validate.yml
    with:
      config-path: test-fixtures/ci/base-image/.ci/config.json
      tool-image: ${{ needs.validate-ci-contracts.outputs.fixture_tool_image }}

  test-ci-service:
    name: test-ci-service
    needs: validate-ci-contracts
    uses: ./.github/workflows/validate.yml
    with:
      config-path: test-fixtures/ci/service/.ci/config.json
      tool-image: ${{ needs.validate-ci-contracts.outputs.fixture_tool_image }}

  test-ci-release-dry-run:
    name: test-ci-release-dry-run
    needs: validate-ci-contracts
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/release.yml
    with:
      config-path: test-fixtures/ci/service/.ci/config.json
      publish: false
      tool-image: ${{ needs.validate-ci-contracts.outputs.fixture_tool_image }}

  validate-release-json-fixture:
    name: validate-release-json-fixture
    needs: validate-ci-contracts
    uses: ./.github/workflows/validate-release-json.yml
    with:
      tool-image: ${{ needs.validate-ci-contracts.outputs.fixture_tool_image }}
      release-json-path: test-fixtures/ci/release-json/release.json

  test-summary:
    name: test-summary
    needs:
      - validate-ci-contracts
      - test-ci-base-image
      - test-ci-service
      - test-ci-release-dry-run
      - validate-release-json-fixture
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Summarize CI workflow tests
        shell: bash
        env:
          VALIDATE_RESULT: ${{ needs.validate-ci-contracts.result }}
          BASE_IMAGE_RESULT: ${{ needs.test-ci-base-image.result }}
          SERVICE_RESULT: ${{ needs.test-ci-service.result }}
          RELEASE_DRY_RUN_RESULT: ${{ needs.test-ci-release-dry-run.result }}
          RELEASE_JSON_RESULT: ${{ needs.validate-release-json-fixture.result }}
        run: |
          set -euo pipefail

          {
            echo "## CI Workflow Test Summary"
            echo ""
            echo "- Contract validation: \`$VALIDATE_RESULT\`"
            echo "- Base-image fixture validation: \`$BASE_IMAGE_RESULT\`"
            echo "- Service fixture validation: \`$SERVICE_RESULT\`"
            echo "- Release dry run: \`$RELEASE_DRY_RUN_RESULT\`"
            echo "- release.json fixture validation: \`$RELEASE_JSON_RESULT\`"
          } >> "$GITHUB_STEP_SUMMARY"

          for result in "$VALIDATE_RESULT" "$BASE_IMAGE_RESULT" "$SERVICE_RESULT" "$RELEASE_DRY_RUN_RESULT" "$RELEASE_JSON_RESULT"; do
            if [ "$result" != "success" ]; then
              echo "CI workflow tests failed" >&2
              exit 1
            fi
          done
