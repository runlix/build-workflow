name: Test CI Workflows

on:
  pull_request:
    paths:
      - 'tools/ci/**'
      - '.github/workflows/validate.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/sync-release-record.yml'
      - '.github/workflows/validate-sync-wrapper.yml'
      - '.github/workflows/publish-tool-image.yml'
      - '.github/workflows/test-ci.yml'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'docs/ci.md'
      - 'examples/ci/**'
      - 'examples/wrappers/**'
      - 'schema/ci-config.schema.json'
      - 'schema/release-record.schema.json'
      - 'test-fixtures/ci/**'
  push:
    branches:
      - main
    paths:
      - 'tools/ci/**'
      - '.github/workflows/validate.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/sync-release-record.yml'
      - '.github/workflows/validate-sync-wrapper.yml'
      - '.github/workflows/publish-tool-image.yml'
      - '.github/workflows/test-ci.yml'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'docs/ci.md'
      - 'examples/ci/**'
      - 'examples/wrappers/**'
      - 'schema/ci-config.schema.json'
      - 'schema/release-record.schema.json'
      - 'test-fixtures/ci/**'
  workflow_dispatch:

concurrency:
  group: test-ci-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-ci-contracts:
    name: validate-ci-contracts
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install test dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user -r tools/ci/requirements.txt

      - name: Validate schema structure
        shell: bash
        run: |
          set -euo pipefail

          tools/ci/bin/build-workflow-ci validate-schema-file schema/ci-config.schema.json
          tools/ci/bin/build-workflow-ci validate-schema-file schema/release-record.schema.json

      - name: Validate examples and fixtures
        shell: bash
        run: |
          set -euo pipefail

          for file in \
            examples/ci/base-image-config.json \
            examples/ci/service-config.json
          do
            tools/ci/bin/build-workflow-ci validate-config-payload "$file"
          done

          for file in \
            test-fixtures/ci/base-image/.ci/config.json \
            test-fixtures/ci/service/.ci/config.json
          do
            tools/ci/bin/build-workflow-ci validate-config "$file" > /dev/null
          done

          tools/ci/bin/build-workflow-ci validate-release-record test-fixtures/ci/release-record/release-record.json
          tools/ci/bin/build-workflow-ci validate-release-record test-fixtures/ci/release-record/release.expected.json

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          python3 -m unittest discover -s tools/ci/tests -p 'test_*.py'

      - name: Run direct CLI smoke tests
        shell: bash
        run: |
          set -euo pipefail

          tools/ci/bin/build-workflow-ci validate-config test-fixtures/ci/service/.ci/config.json > /tmp/validate.json
          jq -e '.image_name == "ghcr.io/runlix/test-service"' /tmp/validate.json > /dev/null
          jq -e '.context_dir == "test-fixtures/ci/service"' /tmp/validate.json > /dev/null

          tools/ci/bin/build-workflow-ci \
            plan-matrix test-fixtures/ci/service/.ci/config.json \
            --short-sha 1234567 \
            > /tmp/matrix.json
          jq -e 'length == 2' /tmp/matrix.json > /dev/null
          jq -e '.[0].manifest_tag != null' /tmp/matrix.json > /dev/null

          tools/ci/bin/build-workflow-ci \
            plan-build-target test-fixtures/ci/service/.ci/config.json \
            --target-name stable-amd64 \
            --mode pr \
            --short-sha 1234567 \
            > /tmp/build-target.json
          jq -e '.image_tag == "ghcr.io/runlix/test-service:pr-1234567-stable-amd64"' /tmp/build-target.json > /dev/null
          jq -e '.build_args.BASE_REF != null' /tmp/build-target.json > /dev/null

          tools/ci/bin/build-workflow-ci \
            plan-manifests test-fixtures/ci/service/.ci/config.json \
            --short-sha 1234567 \
            > /tmp/manifests.json
          jq -e '.[0].refs | length > 0' /tmp/manifests.json > /dev/null

          tools/ci/bin/build-workflow-ci \
            render-release-record test-fixtures/ci/service/.ci/config.json \
            --source-sha 1234567890abcdef1234567890abcdef12345678 \
            --published-at 2026-03-17T12:00:00Z \
            > /tmp/release-record.actual.json

          tools/ci/bin/build-workflow-ci validate-release-record /tmp/release-record.actual.json
          tools/ci/bin/build-workflow-ci write-release-json /tmp/release-record.actual.json --output /tmp/release.json
          tools/ci/bin/build-workflow-ci validate-release-record /tmp/release.json

          diff -u test-fixtures/ci/release-record/release.expected.json /tmp/release.json

          tools/ci/bin/build-workflow-ci \
            render-telegram-notification test-fixtures/ci/release-record/release-record.json \
            --image-name ghcr.io/runlix/test-service \
            --repository runlix/test-service \
            --server-url https://github.com \
            --run-id 123456 \
            > /tmp/telegram-message.txt
          grep -F "*Version:* \`1.2.3\`" /tmp/telegram-message.txt > /dev/null

      - name: Build local tool image
        shell: bash
        run: |
          set -euo pipefail
          docker build -f tools/ci/Dockerfile -t build-workflow-tools:test .

      - name: Run tool image smoke tests
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm \
            --entrypoint bash \
            -v "$PWD:/workspace" \
            -w /workspace \
            build-workflow-tools:test \
            --noprofile --norc -e -o pipefail -c 'command -v build-workflow-ci >/dev/null && build-workflow-ci validate-config test-fixtures/ci/base-image/.ci/config.json' \
            > /tmp/container-validate.json

          jq -e '.enabled_count == 2' /tmp/container-validate.json > /dev/null

          docker run --rm \
            --entrypoint bash \
            -v "$PWD:/workspace" \
            -w /workspace \
            build-workflow-tools:test \
            --noprofile --norc -e -o pipefail -c 'command -v build-workflow-ci >/dev/null && build-workflow-ci render-release-record test-fixtures/ci/service/.ci/config.json --source-sha 1234567890abcdef1234567890abcdef12345678 --published-at 2026-03-17T12:00:00Z' \
            > /tmp/container-release-record.json

          diff -u test-fixtures/ci/release-record/release-record.json /tmp/container-release-record.json

      - name: Validate sync wrapper fixture contract
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import re
          from pathlib import Path

          def validate_sync_wrapper(text: str) -> dict[str, str]:
              workflow = text.replace("\r\n", "\n")

              def require(pattern: str, message: str) -> re.Match[str]:
                  match = re.search(pattern, workflow, flags=re.MULTILINE)
                  if match is None:
                      raise AssertionError(message)
                  return match

              assert not re.search(r"(?m)^  workflow_dispatch:", workflow), "sync wrapper must not define workflow_dispatch"
              assert not re.search(r"(?m)^  pull_request(_target)?:", workflow), "sync wrapper must not define pull_request-style triggers"
              assert not re.search(r"(?m)^ {4}(runs-on|steps|container|env|permissions):", workflow), "sync wrapper must stay thin"
              assert "actions/checkout@" not in workflow, "sync wrapper must not inline checkout steps"
              assert "secrets: inherit" not in workflow, "sync wrapper must map explicit app secrets"

              require(r"(?m)^name: Sync Release Record$", "sync wrapper name drifted")
              require(
                  r"^on:\n"
                  r"  workflow_run:\n"
                  r"    workflows:\n"
                  r"      - Release\n"
                  r"    branches:\n"
                  r"      - release\n"
                  r"    types:\n"
                  r"      - completed\n",
                  "sync wrapper trigger drifted",
              )
              permissions_match = require(
                  r"^permissions:\n(?P<body>(?:  [^\n]+\n)+)\n(?=jobs:\n)",
                  "sync wrapper permissions block is missing",
              )
              assert permissions_match.group("body") == "  actions: read\n  contents: write\n", "sync wrapper permissions drifted"
              job_match = require(
                  r"^jobs:\n"
                  r"  sync:\n"
                  r"    concurrency:\n"
                  r"      group: sync-release-record-\$\{\{ github\.repository \}\}\n"
                  r"      cancel-in-progress: false\n"
                  r"    uses: runlix/build-workflow/\.github/workflows/sync-release-record\.yml@(?P<workflow_sha>[0-9a-f]{40})\n"
                  r"    with:\n"
                  r"      tool-image: (?P<tool_image>ghcr\.io/runlix/build-workflow-tools@sha256:[0-9a-f]{64})\n"
                  r"    secrets:\n"
                  r"      RUNLIX_APP_ID: \$\{\{ secrets\.RUNLIX_APP_ID \}\}\n"
                  r"      RUNLIX_PRIVATE_KEY: \$\{\{ secrets\.RUNLIX_PRIVATE_KEY \}\}\n?\Z",
                  "sync wrapper job contract drifted",
              )
              return {
                  "workflow_ref": job_match.group("workflow_sha"),
                  "tool_image": job_match.group("tool_image"),
              }

          fixture = Path("test-fixtures/ci/sync-wrapper/sync-release-record.yml").read_text(encoding="utf-8")
          payload = validate_sync_wrapper(fixture)
          assert payload["workflow_ref"] == "eb288b2da9962053234ab66fa4f041201887f72b"
          assert payload["tool_image"] == "ghcr.io/runlix/build-workflow-tools@sha256:77f0f999885f898c992cded0d76c3e5f12d74e12080be44b9ea316f6a5a94bdf"

          invalid_cases = {
              "unpinned reusable workflow ref": fixture.replace(
                  "@eb288b2da9962053234ab66fa4f041201887f72b",
                  "@main",
              ),
              "wrong trigger workflow": fixture.replace("- Release", "- Validate", 1),
              "widened permissions": fixture.replace(
                  "permissions:\n  actions: read\n  contents: write\n",
                  "permissions:\n  actions: read\n  contents: write\n  packages: write\n",
                  1,
              ),
              "mutable tool image": fixture.replace(
                  "@sha256:77f0f999885f898c992cded0d76c3e5f12d74e12080be44b9ea316f6a5a94bdf",
                  ":ci",
                  1,
              ),
              "missing secret mapping": re.sub(
                  r"(?m)^      RUNLIX_PRIVATE_KEY: .*\n",
                  "",
                  fixture,
                  count=1,
              ),
              "removed queueing guard": fixture.replace(
                  "cancel-in-progress: false",
                  "cancel-in-progress: true",
                  1,
              ),
          }

          for label, candidate in invalid_cases.items():
              try:
                  validate_sync_wrapper(candidate)
              except AssertionError:
                  continue
              raise AssertionError(f"{label} unexpectedly passed validation")
          PY

      - name: Verify public workflow contract
        shell: bash
        run: |
          set -euo pipefail

          expected_build_push_action_sha='d08e5c354a6adb9ed34480a06d141179aa583294'
          old_build_push_action_sha='263435318d21b8e681c14492fe198d362a7d2c83'
          expected_app_token_action_sha='f8d387b68d61c58ab83c6c016672934102569859'

          test -f .github/workflows/validate.yml
          test -f .github/workflows/release.yml
          test -f .github/workflows/sync-release-record.yml
          test -f .github/workflows/validate-sync-wrapper.yml
          test ! -e .github/workflows/pr-validation.yml
          test ! -e .github/workflows/sync-release-metadata.yml
          test ! -e schema/release-metadata.schema.json
          test ! -e schema/releases.schema.json
          if grep -InE 'ghcr\.io/runlix/build-workflow-tools:ci' \
            .github/workflows/validate.yml \
            .github/workflows/release.yml \
            .github/workflows/sync-release-record.yml
          then
            echo "Mutable tool-image defaults remain in public workflows" >&2
            exit 1
          fi

          for workflow_file in \
            .github/workflows/validate.yml \
            .github/workflows/release.yml \
            .github/workflows/sync-release-record.yml \
            .github/workflows/validate-sync-wrapper.yml
          do
            if grep -InE 'scripts/ci/|release-metadata|releases\.json|sync-release-metadata|pr-validation' "$workflow_file"; then
              echo "Legacy v2 references remain in $workflow_file" >&2
              exit 1
            fi
          done

          grep -Eq 'TRIGGER_WORKFLOW: \$\{\{ github\.event\.workflow_run\.name \}\}' .github/workflows/sync-release-record.yml
          grep -Eq 'TRIGGER_BRANCH: \$\{\{ github\.event\.workflow_run\.head_branch \}\}' .github/workflows/sync-release-record.yml
          grep -Eq 'TRIGGER_REPOSITORY: \$\{\{ github\.event\.workflow_run\.repository\.full_name \}\}' .github/workflows/sync-release-record.yml
          grep -Eq 'HEAD_SHA: \$\{\{ github\.event\.workflow_run\.head_sha \}\}' .github/workflows/sync-release-record.yml
          grep -Eq 'run-id: \$\{\{ github\.event\.workflow_run\.id \}\}' .github/workflows/sync-release-record.yml
          grep -Eq 'RUNLIX_APP_ID:' .github/workflows/sync-release-record.yml
          grep -Eq 'RUNLIX_PRIVATE_KEY:' .github/workflows/sync-release-record.yml
          grep -Eq "actions/create-github-app-token@${expected_app_token_action_sha}" .github/workflows/sync-release-record.yml
          grep -Eq 'permission-contents: write' .github/workflows/sync-release-record.yml
          grep -Eq '^on:$' .github/workflows/validate-sync-wrapper.yml
          grep -Eq '^  workflow_call:$' .github/workflows/validate-sync-wrapper.yml
          grep -Eq '^      workflow-path:$' .github/workflows/validate-sync-wrapper.yml
          grep -Eq '^        default: \.github/workflows/sync-release-record\.yml$' .github/workflows/validate-sync-wrapper.yml
          grep -Eq '^permissions:$' .github/workflows/validate-sync-wrapper.yml
          grep -Eq '^  contents: read$' .github/workflows/validate-sync-wrapper.yml
          grep -Eq '^        uses: actions/checkout@' .github/workflows/validate-sync-wrapper.yml
          grep -Eq '^          persist-credentials: false$' .github/workflows/validate-sync-wrapper.yml
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path(".github/workflows/sync-release-record.yml").read_text()
          render = workflow.split("  render-release-json:")[1].split("  commit-release-json:")[0]
          commit = workflow.split("  commit-release-json:")[1]

          assert "container:" in render
          assert "uses: actions/checkout@" not in render
          assert "git push origin HEAD:main" not in render
          assert "name: Upload normalized release.json artifact" in render

          assert "container:" not in commit
          assert "actions/create-github-app-token@" in commit
          assert "uses: actions/checkout@" in commit
          assert "permission-contents: write" in commit
          assert "steps.app-token.outputs.token" in commit
          assert "working-directory:" in commit
          assert "github.workspace" in commit
          assert "git push origin HEAD:main" in commit

          validate_sync_wrapper = Path(".github/workflows/validate-sync-wrapper.yml").read_text()
          assert "tool-image:" not in validate_sync_wrapper
          assert "docker/login-action@" not in validate_sync_wrapper
          assert "pull_request_target" not in validate_sync_wrapper
          assert "secrets:" not in validate_sync_wrapper.split("jobs:", 1)[0]
          assert "sync-release-record.yml@" not in validate_sync_wrapper
          assert "python3 - <<'PY' > /tmp/validated-sync-wrapper.json" in validate_sync_wrapper
          PY

          grep -Eq 'uses: runlix/build-workflow/.github/workflows/validate.yml@YOUR_BUILD_WORKFLOW_SHA' examples/wrappers/validate.yml
          grep -Eq 'uses: runlix/build-workflow/.github/workflows/release.yml@YOUR_BUILD_WORKFLOW_SHA' examples/wrappers/release.yml
          grep -Eq 'uses: runlix/build-workflow/.github/workflows/sync-release-record.yml@YOUR_BUILD_WORKFLOW_SHA' examples/wrappers/sync-release-record.yml
          grep -Eq 'uses: runlix/build-workflow/.github/workflows/validate-sync-wrapper.yml@YOUR_BUILD_WORKFLOW_SHA' examples/wrappers/validate-main-sync-wrapper.yml
          grep -Eq 'tool-image: ghcr.io/runlix/build-workflow-tools@sha256:YOUR_TOOL_IMAGE_DIGEST' examples/wrappers/validate.yml
          grep -Eq 'tool-image: ghcr.io/runlix/build-workflow-tools@sha256:YOUR_TOOL_IMAGE_DIGEST' examples/wrappers/release.yml
          grep -Eq 'tool-image: ghcr.io/runlix/build-workflow-tools@sha256:YOUR_TOOL_IMAGE_DIGEST' examples/wrappers/sync-release-record.yml
          grep -Eq 'TELEGRAM_BOT_TOKEN:' examples/wrappers/release.yml
          grep -Eq 'TELEGRAM_CHAT_ID:' examples/wrappers/release.yml
          grep -Eq 'RUNLIX_APP_ID:' examples/wrappers/sync-release-record.yml
          grep -Eq 'RUNLIX_PRIVATE_KEY:' examples/wrappers/sync-release-record.yml
          grep -Eq 'group: sync-release-record-\$\{\{ github\.repository \}\}' examples/wrappers/sync-release-record.yml
          grep -Eq 'cancel-in-progress: false' examples/wrappers/sync-release-record.yml
          grep -Eq '^[[:space:]]+- main$' examples/wrappers/validate-main-sync-wrapper.yml
          grep -Eq 'workflow-path: \.github/workflows/sync-release-record\.yml' examples/wrappers/validate-main-sync-wrapper.yml
          grep -Eq '\.github/workflows/validate-main-sync-wrapper\.yml' examples/wrappers/validate-main-sync-wrapper.yml

          test -f test-fixtures/ci/sync-wrapper/sync-release-record.yml

          python3 - <<'PY'
          from pathlib import Path

          workflow = Path(".github/workflows/test-ci.yml").read_text()
          assert "\non:\n" in workflow, "test-ci missing top-level on block"
          assert "\nconcurrency:\n" in workflow, "test-ci missing workflow concurrency block"

          on_section = workflow.split("\non:\n", 1)[1].split("\nconcurrency:\n", 1)[0]
          normalized_on_section = "\n" + on_section
          push_section = on_section.split("\n  push:\n", 1)[1].split("\n    paths:\n", 1)[0]
          gha_open = "$" + "{{"

          assert "\n  pull_request:\n" in normalized_on_section, "test-ci missing pull_request trigger"
          assert "\n  push:\n" in normalized_on_section, "test-ci missing push trigger"
          assert "\n  workflow_dispatch:\n" in normalized_on_section, "test-ci missing workflow_dispatch trigger"
          assert "      - main" in push_section, "test-ci push trigger no longer includes main"
          assert "side/**" not in push_section, "test-ci still auto-runs on side branch pushes"
          assert "refactor/**" not in push_section, "test-ci still auto-runs on refactor branch pushes"
          assert "validate-sync-wrapper-fixture:" in workflow, "test-ci missing sync-wrapper fixture self-call"
          assert "uses: ./.github/workflows/validate-sync-wrapper.yml" in workflow, "test-ci no longer self-calls validate-sync-wrapper"
          assert "workflow-path: test-fixtures/ci/sync-wrapper/sync-release-record.yml" in workflow, "test-ci missing sync-wrapper fixture path"

          assert (
              "group: test-ci-"
              + gha_open
              + " github.repository }}-"
              + gha_open
              + " github.event.pull_request.number || github.ref }}"
              in workflow
          ), "test-ci concurrency group drifted"
          assert "cancel-in-progress: true" in workflow, "test-ci concurrency should cancel superseded runs"
          PY

          grep -Eq '^[[:space:]]+- main$' .github/workflows/publish-tool-image.yml
          if grep -Eq '^[[:space:]]+- side/\*\*$|^[[:space:]]+- refactor/\*\*$' .github/workflows/publish-tool-image.yml; then
            echo "Standalone tool-image publish still auto-runs on side or refactor branches" >&2
            exit 1
          fi
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path(".github/workflows/publish-tool-image.yml").read_text()
          publish_immutable = workflow.split("  publish-immutable:")[1].split("  update-ci-alias:")[0]
          update_ci_alias = workflow.split("  update-ci-alias:")[1]
          gha_open = "$" + "{{"

          assert "name: publish-immutable" in publish_immutable, "publish-tool-image missing publish-immutable job"
          assert "name: Build and push immutable tool image" in publish_immutable, "publish-tool-image missing immutable build step"
          assert (
              "ghcr.io/runlix/build-workflow-tools:sha-"
              + gha_open
              + " github.sha }}"
              in publish_immutable
          ), "publish-tool-image no longer pushes the immutable sha tag"
          assert "ghcr.io/runlix/build-workflow-tools:ci" not in publish_immutable, "publish-tool-image still pushes :ci from the immutable job"

          assert "name: update-ci-alias" in update_ci_alias, "publish-tool-image missing update-ci-alias job"
          assert (
              "if: "
              + gha_open
              + " github.ref == 'refs/heads/main' }}"
              in update_ci_alias
          ), "publish-tool-image alias job should still be gated to main"
          assert (
              "group: publish-tool-image-ci-"
              + gha_open
              + " github.repository }}"
              in update_ci_alias
          ), "publish-tool-image alias job concurrency group drifted"
          assert "cancel-in-progress: true" in update_ci_alias, "publish-tool-image alias job should cancel superseded runs"
          assert "docker buildx imagetools create \\" in update_ci_alias, "publish-tool-image alias job no longer retags via imagetools"
          assert (
              "needs.publish-immutable.outputs.digest" in update_ci_alias
          ), "publish-tool-image alias job no longer consumes the immutable digest"
          PY

          python3 - <<'PY'
          import re
          from pathlib import Path

          workflow = Path(".github/workflows/test-ci.yml").read_text()
          build_match = re.search(
              r"^  build-tool-image-artifact:\n(?P<body>.*?)(?=^  verify-tool-image-artifact:\n)",
              workflow,
              flags=re.MULTILINE | re.DOTALL,
          )
          verify_match = re.search(
              r"^  verify-tool-image-artifact:\n(?P<body>.*?)(?=^  test-release-record-artifact:\n)",
              workflow,
              flags=re.MULTILINE | re.DOTALL,
          )
          summary_match = re.search(
              r"^  test-summary:\n(?P<body>.*)$",
              workflow,
              flags=re.MULTILINE | re.DOTALL,
          )

          assert build_match is not None
          assert verify_match is not None
          assert summary_match is not None

          build_job = build_match.group("body")
          verify_job = verify_match.group("body")
          summary_job = summary_match.group("body")

          assert "packages: write" not in build_job
          assert "packages: write" not in verify_job
          assert "docker/login-action@" not in build_job
          assert "docker/login-action@" not in verify_job
          assert "ghcr.io/runlix/build-workflow-tools:ci" not in build_job
          assert "ghcr.io/runlix/build-workflow-tools:ci" not in verify_job
          assert "ghcr.io/runlix/build-workflow-tools:sha-" not in build_job
          assert "ghcr.io/runlix/build-workflow-tools:sha-" not in verify_job
          assert "ci-test-" not in build_job
          assert "ci-test-" not in verify_job
          assert "push: true" not in build_job
          assert "name: build-tool-image-artifact" in workflow
          assert "name: verify-tool-image-artifact" in workflow
          assert "name: Build multi-platform tool image" in build_job
          assert "type=cacheonly" in build_job
          assert "name: Export amd64 tool image tarball" in build_job
          assert "type=docker,dest=" in build_job
          assert "name: Upload tool image artifact" in build_job
          assert "name: Download tool image artifact" in verify_job
          assert "docker load -i" in verify_job
          assert "actions/upload-artifact@" in build_job
          assert "actions/download-artifact@" in verify_job
          assert "build-workflow-tools-test-amd64.tar" in build_job
          assert "build-workflow-tools:test-amd64" in build_job
          assert "Tool image artifact build" in summary_job
          assert "Tool image artifact verification" in summary_job
          PY

          for workflow_file in \
            .github/workflows/test-ci.yml \
            .github/workflows/publish-tool-image.yml
          do
            grep -Eq "docker/build-push-action@${expected_build_push_action_sha}" "$workflow_file"
            if grep -Eq "docker/build-push-action@${old_build_push_action_sha}" "$workflow_file"; then
              echo "Deprecated build-push-action pin remains in $workflow_file" >&2
              exit 1
            fi
          done

          curl --fail --silent --show-error --location \
            "https://raw.githubusercontent.com/docker/build-push-action/${expected_build_push_action_sha}/action.yml" \
            | grep -Eq "^  using: 'node24'$"

  validate-sync-wrapper-fixture:
    name: validate-sync-wrapper-fixture
    needs: validate-ci-contracts
    uses: ./.github/workflows/validate-sync-wrapper.yml
    with:
      workflow-path: test-fixtures/ci/sync-wrapper/sync-release-record.yml

  build-tool-image-artifact:
    name: build-tool-image-artifact
    needs: validate-ci-contracts
    runs-on: ubuntu-24.04
    outputs:
      tool_image: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set local image refs
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          printf 'artifact_name=%s\n' "tool-image-amd64" >> "$GITHUB_OUTPUT"
          printf 'artifact_path=%s\n' "${RUNNER_TEMP}/build-workflow-tools-test-amd64.tar" >> "$GITHUB_OUTPUT"
          printf 'image_tag=%s\n' "build-workflow-tools:test-amd64" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build multi-platform tool image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: tools/ci/Dockerfile
          platforms: linux/amd64,linux/arm64
          outputs: type=cacheonly

      - name: Export amd64 tool image tarball
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: tools/ci/Dockerfile
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.image_tag }}
          outputs: type=docker,dest=${{ steps.meta.outputs.artifact_path }}

      - name: Upload tool image artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ steps.meta.outputs.artifact_path }}
          retention-days: 1

  verify-tool-image-artifact:
    name: verify-tool-image-artifact
    needs:
      - validate-ci-contracts
      - build-tool-image-artifact
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download tool image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tool-image-amd64
          path: ${{ runner.temp }}/tool-image-artifact

      - name: Load tool image artifact
        shell: bash
        run: |
          set -euo pipefail
          docker load -i "${{ runner.temp }}/tool-image-artifact/build-workflow-tools-test-amd64.tar"

      - name: Validate service fixture with artifact tool image
        shell: bash
        env:
          TOOL_IMAGE: ${{ needs.build-tool-image-artifact.outputs.tool_image }}
        run: |
          set -euo pipefail

          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$TOOL_IMAGE" \
            validate-config test-fixtures/ci/service/.ci/config.json \
            > /tmp/published-validate.json

          jq -e '.image_name == "ghcr.io/runlix/test-service"' /tmp/published-validate.json > /dev/null
          jq -e '.enabled_count == 2' /tmp/published-validate.json > /dev/null

      - name: Render release record with artifact tool image
        shell: bash
        env:
          TOOL_IMAGE: ${{ needs.build-tool-image-artifact.outputs.tool_image }}
        run: |
          set -euo pipefail

          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$TOOL_IMAGE" \
            render-release-record test-fixtures/ci/service/.ci/config.json \
            --source-sha 1234567890abcdef1234567890abcdef12345678 \
            --published-at 2026-03-17T12:00:00Z \
            > /tmp/published-release-record.json

          diff -u test-fixtures/ci/release-record/release-record.json /tmp/published-release-record.json

  test-release-record-artifact:
    name: test-release-record-artifact
    needs: validate-ci-contracts
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Upload synthetic release record artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: release-record
          path: test-fixtures/ci/release-record/release-record.json
          retention-days: 1

      - name: Download synthetic release record artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-record
          path: downloaded-artifact

      - name: Validate synthetic artifact contract
        shell: bash
        run: |
          set -euo pipefail

          tools/ci/bin/build-workflow-ci validate-release-record downloaded-artifact/release-record.json
          tools/ci/bin/build-workflow-ci write-release-json downloaded-artifact/release-record.json --output /tmp/release.json

          diff -u test-fixtures/ci/release-record/release.expected.json /tmp/release.json

  test-summary:
    name: test-summary
    needs:
      - validate-ci-contracts
      - validate-sync-wrapper-fixture
      - build-tool-image-artifact
      - verify-tool-image-artifact
      - test-release-record-artifact
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Summarize CI workflow tests
        shell: bash
        env:
          VALIDATE_RESULT: ${{ needs.validate-ci-contracts.result }}
          SYNC_WRAPPER_RESULT: ${{ needs.validate-sync-wrapper-fixture.result }}
          IMAGE_RESULT: ${{ needs.build-tool-image-artifact.result }}
          PUBLISHED_IMAGE_RESULT: ${{ needs.verify-tool-image-artifact.result }}
          RECORD_RESULT: ${{ needs.test-release-record-artifact.result }}
        run: |
          set -euo pipefail

          {
            echo "## CI Workflow Test Summary"
            echo ""
            echo "- Contract validation: \`$VALIDATE_RESULT\`"
            echo "- Sync wrapper reusable validation: \`$SYNC_WRAPPER_RESULT\`"
            echo "- Tool image artifact build: \`$IMAGE_RESULT\`"
            echo "- Tool image artifact verification: \`$PUBLISHED_IMAGE_RESULT\`"
            echo "- Release record contract: \`$RECORD_RESULT\`"
          } >> "$GITHUB_STEP_SUMMARY"

          for result in \
            "$VALIDATE_RESULT" \
            "$SYNC_WRAPPER_RESULT" \
            "$IMAGE_RESULT" \
            "$PUBLISHED_IMAGE_RESULT" \
            "$RECORD_RESULT"
          do
            if [ "$result" != "success" ]; then
              echo "CI workflow tests failed" >&2
              exit 1
            fi
          done
