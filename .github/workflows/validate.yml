name: CI Validate

on:
  workflow_call:
    inputs:
      config-path:
        description: Maintainer override for contract fixtures.
        required: false
        default: .ci/config.json
        type: string
      tool-image:
        description: Maintainer override for branch validation of the CI tool image.
        required: false
        default: ghcr.io/runlix/build-workflow-tools:ci
        type: string

concurrency:
  group: validate-${{ github.repository }}-${{ github.ref }}-${{ inputs.config-path }}
  cancel-in-progress: true

jobs:
  plan:
    name: plan
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    container:
      image: ${{ inputs.tool-image }}
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      short_sha: ${{ steps.context.outputs.short_sha }}
      image_name: ${{ steps.validate.outputs.image_name }}
      version: ${{ steps.validate.outputs.version }}
      enabled_count: ${{ steps.validate.outputs.enabled_count }}
      manifest_tags: ${{ steps.validate.outputs.manifest_tags }}
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve source context
        id: context
        shell: bash
        run: |
          set -euo pipefail
          printf 'short_sha=%s\n' "${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Validate CI config
        id: validate
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          set -euo pipefail

          build-workflow-ci validate-config "$CONFIG_PATH" > /tmp/validate-config.json

          {
            printf 'image_name=%s\n' "$(jq -r '.image_name' /tmp/validate-config.json)"
            printf 'version=%s\n' "$(jq -r '.version // ""' /tmp/validate-config.json)"
            printf 'enabled_count=%s\n' "$(jq -r '.enabled_count' /tmp/validate-config.json)"
            printf 'manifest_tags=%s\n' "$(jq -r '.manifest_tags | join(", ")' /tmp/validate-config.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Plan build matrix
        id: plan
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
          SHORT_SHA: ${{ steps.context.outputs.short_sha }}
        run: |
          set -euo pipefail

          build-workflow-ci plan-matrix "$CONFIG_PATH" --short-sha "$SHORT_SHA" > /tmp/plan-matrix.json
          printf 'matrix=%s\n' "$(jq -c . /tmp/plan-matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    name: build
    permissions:
      contents: read
    needs: plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Plan target build
        id: plan-build
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
          SHORT_SHA: ${{ needs.plan.outputs.short_sha }}
          TARGET_NAME: ${{ matrix.name }}
          TOOL_IMAGE: ${{ inputs.tool-image }}
        run: |
          set -euo pipefail

          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$TOOL_IMAGE" \
            plan-build-target "$CONFIG_PATH" \
            --target-name "$TARGET_NAME" \
            --mode pr \
            --short-sha "$SHORT_SHA" \
            > /tmp/build-target-plan.json

          {
            printf 'image_tag=%s\n' "$(jq -r '.image_tag' /tmp/build-target-plan.json)"
            printf 'platform=%s\n' "$(jq -r '.platform' /tmp/build-target-plan.json)"
            printf 'test_script=%s\n' "$(jq -r '.test // ""' /tmp/build-target-plan.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Build target
        shell: bash
        run: |
          set -euo pipefail

          image_tag="$(jq -r '.image_tag' /tmp/build-target-plan.json)"
          platform="$(jq -r '.platform' /tmp/build-target-plan.json)"
          dockerfile="$(jq -r '.dockerfile' /tmp/build-target-plan.json)"
          context_dir="$(jq -r '.context_dir' /tmp/build-target-plan.json)"

          build_args=()
          while IFS=$'\t' read -r key value; do
            build_args+=(--build-arg "$key=$value")
          done < <(jq -r '.build_args | to_entries[] | [.key, .value] | @tsv' /tmp/build-target-plan.json)

          label_args=()
          while IFS=$'\t' read -r key value; do
            label_args+=(--label "$key=$value")
          done < <(jq -r '.labels | to_entries[] | [.key, .value] | @tsv' /tmp/build-target-plan.json)

          docker buildx build \
            --platform "$platform" \
            -f "$dockerfile" \
            "${build_args[@]}" \
            "${label_args[@]}" \
            --load \
            -t "$image_tag" \
            "$context_dir"

      - name: Run target test
        if: ${{ steps.plan-build.outputs.test_script != '' }}
        timeout-minutes: 10
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.plan-build.outputs.image_tag }}
          PLATFORM: ${{ steps.plan-build.outputs.platform }}
          TEST_SCRIPT: ${{ steps.plan-build.outputs.test_script }}
        run: |
          set -euo pipefail

          echo "Running test script: $TEST_SCRIPT"
          chmod +x "$TEST_SCRIPT"
          "$TEST_SCRIPT"

  summary:
    name: summary
    permissions:
      contents: read
    needs:
      - plan
      - build
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Generate validation summary
        shell: bash
        env:
          PLAN_RESULT: ${{ needs.plan.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          SHORT_SHA: ${{ needs.plan.outputs.short_sha }}
          IMAGE_NAME: ${{ needs.plan.outputs.image_name }}
          MATRIX_JSON: ${{ needs.plan.outputs.matrix }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          {
            echo "## Validation Summary"
            echo ""
            echo "- Repository: \`$REPOSITORY\`"
            echo "- Commit: \`$SHORT_SHA\`"
            echo "- Plan result: \`$PLAN_RESULT\`"
            echo "- Build result: \`$BUILD_RESULT\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$PLAN_RESULT" = "success" ] && [ -n "${MATRIX_JSON:-}" ]; then
            target_count="$(jq 'length' <<< "$MATRIX_JSON")"
            manifest_tags="$(jq -r '[.[].manifest_tag] | unique | join(", ")' <<< "$MATRIX_JSON")"

            {
              echo "### Build Plan"
              echo ""
              echo "- Image: \`$IMAGE_NAME\`"
              echo "- Enabled targets: \`$target_count\`"
              echo "- Manifest tags: \`$manifest_tags\`"
              echo ""
              echo "| Target | Platform | Manifest Tag | Dockerfile | Test |"
              echo "| --- | --- | --- | --- | --- |"
              jq -r '
                .[]
                | "| \(.name) | \(.platform) | \(.manifest_tag) | \(.dockerfile) | "
                  + (if (.test // "") == "" then "no" else "yes" end)
                  + " |"
              ' <<< "$MATRIX_JSON"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "[View workflow run]($RUN_URL)" >> "$GITHUB_STEP_SUMMARY"

          if [ "$PLAN_RESULT" != "success" ]; then
            echo "Validation or matrix planning failed." >&2
            exit 1
          fi

          if [ "$BUILD_RESULT" != "success" ]; then
            echo "One or more target builds or tests failed." >&2
            exit 1
          fi
