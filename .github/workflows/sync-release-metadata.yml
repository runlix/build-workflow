name: CI Sync Release Metadata

on:
  workflow_call:

jobs:
  sync:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - name: Verify triggering workflow provenance
        shell: bash
        env:
          TRIGGER_WORKFLOW: ${{ github.event.workflow_run.name }}
          TRIGGER_BRANCH: ${{ github.event.workflow_run.head_branch }}
          TRIGGER_REPOSITORY: ${{ github.event.workflow_run.repository.full_name }}
          CURRENT_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          [ "$TRIGGER_WORKFLOW" = "Release" ] || {
            echo "Unexpected triggering workflow: $TRIGGER_WORKFLOW" >&2
            exit 1
          }

          [ "$TRIGGER_BRANCH" = "release" ] || {
            echo "Unexpected triggering branch: $TRIGGER_BRANCH" >&2
            exit 1
          }

          [ "$TRIGGER_REPOSITORY" = "$CURRENT_REPOSITORY" ] || {
            echo "Unexpected triggering repository: $TRIGGER_REPOSITORY" >&2
            exit 1
          }

      - name: Checkout metadata branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main

      - name: Resolve workflow source
        id: workflow-source
        shell: bash
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          set -euo pipefail

          workflow_repository="${WORKFLOW_REF%%/.github/workflows/*}"

          {
            printf 'repository=%s\n' "$workflow_repository"
            printf 'sha=%s\n' "$WORKFLOW_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout workflow repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ steps.workflow-source.outputs.repository }}
          ref: ${{ steps.workflow-source.outputs.sha }}
          path: .build-workflow

      - name: Download release metadata artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-metadata
          path: artifacts
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Validate release metadata
        shell: bash
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          bash .build-workflow/scripts/ci/validate-release-record.sh artifacts/release-metadata.json

          metadata_sha="$(jq -r '.sha' artifacts/release-metadata.json)"
          [ "$metadata_sha" = "$HEAD_SHA" ] || {
            echo "Release metadata SHA does not match triggering workflow SHA" >&2
            exit 1
          }

      - name: Write releases.json
        shell: bash
        run: |
          set -euo pipefail
          bash .build-workflow/scripts/ci/write-releases-json.sh artifacts/release-metadata.json releases.json

      - name: Validate releases.json
        shell: bash
        run: |
          set -euo pipefail
          bash .build-workflow/scripts/ci/validate-release-record.sh releases.json

      - name: Commit metadata update
        env:
          SERVICE_NAME: ${{ github.event.repository.name }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add releases.json

          if git diff --staged --quiet; then
            echo "No metadata changes to commit"
            exit 0
          fi

          version="$(jq -r '.version // ""' releases.json)"
          short_sha="$(jq -r '.short_sha' releases.json)"

          if [ -n "$version" ]; then
            git commit -m "Release: ${SERVICE_NAME} ${version} @ ${short_sha}"
          else
            git commit -m "Release: ${SERVICE_NAME} @ ${short_sha}"
          fi

          git push origin HEAD:main
