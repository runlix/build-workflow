name: CI Release

on:
  workflow_call:
    inputs:
      config-path:
        description: Maintainer override for contract fixtures.
        required: false
        default: .ci/config.json
        type: string
      publish:
        description: Whether to push images and upload the release record artifact.
        required: false
        default: true
        type: boolean
      tool-image:
        description: Maintainer override for branch validation of the CI tool image.
        required: false
        default: ghcr.io/runlix/build-workflow-tools:ci
        type: string
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  plan:
    name: plan
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    container:
      image: ${{ inputs.tool-image }}
    outputs:
      short_sha: ${{ steps.context.outputs.short_sha }}
      image_name: ${{ steps.validate.outputs.image_name }}
      version: ${{ steps.validate.outputs.version }}
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve source context
        id: context
        shell: bash
        run: |
          set -euo pipefail
          printf 'short_sha=%s\n' "${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Validate CI config
        id: validate
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          set -euo pipefail

          build-workflow-ci validate-config "$CONFIG_PATH" > /tmp/validate-config.json

          {
            printf 'image_name=%s\n' "$(jq -r '.image_name' /tmp/validate-config.json)"
            printf 'version=%s\n' "$(jq -r '.version // ""' /tmp/validate-config.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Plan build matrix
        id: plan
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
          SHORT_SHA: ${{ steps.context.outputs.short_sha }}
        run: |
          set -euo pipefail

          build-workflow-ci plan-matrix "$CONFIG_PATH" --short-sha "$SHORT_SHA" > /tmp/plan-matrix.json
          printf 'matrix=%s\n' "$(jq -c . /tmp/plan-matrix.json)" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: build-and-push
    permissions:
      contents: read
      packages: write
    needs: plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR
        if: ${{ inputs.publish }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Plan target build
        id: plan-build
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
          SHORT_SHA: ${{ needs.plan.outputs.short_sha }}
          TARGET_NAME: ${{ matrix.name }}
          TOOL_IMAGE: ${{ inputs.tool-image }}
        run: |
          set -euo pipefail

          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$TOOL_IMAGE" \
            plan-build-target "$CONFIG_PATH" \
            --target-name "$TARGET_NAME" \
            --mode release \
            --short-sha "$SHORT_SHA" \
            > /tmp/build-target-plan.json

          {
            printf 'image_tag=%s\n' "$(jq -r '.image_tag' /tmp/build-target-plan.json)"
            printf 'platform=%s\n' "$(jq -r '.platform' /tmp/build-target-plan.json)"
            printf 'test_script=%s\n' "$(jq -r '.test // ""' /tmp/build-target-plan.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Build target
        shell: bash
        run: |
          set -euo pipefail

          image_tag="$(jq -r '.image_tag' /tmp/build-target-plan.json)"
          platform="$(jq -r '.platform' /tmp/build-target-plan.json)"
          dockerfile="$(jq -r '.dockerfile' /tmp/build-target-plan.json)"
          context_dir="$(jq -r '.context_dir' /tmp/build-target-plan.json)"

          build_args=()
          while IFS=$'\t' read -r key value; do
            build_args+=(--build-arg "$key=$value")
          done < <(jq -r '.build_args | to_entries[] | [.key, .value] | @tsv' /tmp/build-target-plan.json)

          label_args=()
          while IFS=$'\t' read -r key value; do
            label_args+=(--label "$key=$value")
          done < <(jq -r '.labels | to_entries[] | [.key, .value] | @tsv' /tmp/build-target-plan.json)

          docker buildx build \
            --platform "$platform" \
            -f "$dockerfile" \
            "${build_args[@]}" \
            "${label_args[@]}" \
            --load \
            -t "$image_tag" \
            "$context_dir"

      - name: Run target test
        if: ${{ steps.plan-build.outputs.test_script != '' }}
        timeout-minutes: 10
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.plan-build.outputs.image_tag }}
          PLATFORM: ${{ steps.plan-build.outputs.platform }}
          TEST_SCRIPT: ${{ steps.plan-build.outputs.test_script }}
        run: |
          set -euo pipefail

          echo "Running test script: $TEST_SCRIPT"
          chmod +x "$TEST_SCRIPT"
          "$TEST_SCRIPT"

      - name: Push target image
        if: ${{ inputs.publish }}
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.plan-build.outputs.image_tag }}
        run: |
          set -euo pipefail
          docker push "$IMAGE_TAG"

  publish:
    name: publish
    permissions:
      contents: read
      packages: write
    needs:
      - plan
      - build-and-push
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR
        if: ${{ inputs.publish }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ inputs.publish }}
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Resolve publication timestamp
        id: published-at
        shell: bash
        run: |
          set -euo pipefail
          printf 'value=%s\n' "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

      - name: Plan manifests
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
          SHORT_SHA: ${{ needs.plan.outputs.short_sha }}
          TOOL_IMAGE: ${{ inputs.tool-image }}
        run: |
          set -euo pipefail

          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$TOOL_IMAGE" \
            plan-manifests "$CONFIG_PATH" \
            --short-sha "$SHORT_SHA" \
            > /tmp/manifest-plan.json

      - name: Create manifests
        if: ${{ inputs.publish }}
        shell: bash
        run: |
          set -euo pipefail

          jq -c '.[]' /tmp/manifest-plan.json | while IFS= read -r manifest; do
            tag="$(jq -r '.tag' <<< "$manifest")"
            mapfile -t refs < <(jq -r '.refs[]' <<< "$manifest")

            echo "Creating manifest for $tag"
            docker buildx imagetools create \
              -t "${{ needs.plan.outputs.image_name }}:${tag}" \
              "${refs[@]}"
          done

      - name: Render release record
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
          SOURCE_SHA: ${{ github.sha }}
          PUBLISHED_AT: ${{ steps.published-at.outputs.value }}
          TOOL_IMAGE: ${{ inputs.tool-image }}
        run: |
          set -euo pipefail

          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$TOOL_IMAGE" \
            render-release-record "$CONFIG_PATH" \
            --source-sha "$SOURCE_SHA" \
            --published-at "$PUBLISHED_AT" \
            > release-record.json

      - name: Validate release record
        shell: bash
        env:
          TOOL_IMAGE: ${{ inputs.tool-image }}
        run: |
          set -euo pipefail

          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$TOOL_IMAGE" \
            validate-release-record release-record.json

      - name: Upload release record
        if: ${{ inputs.publish }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: release-record
          path: release-record.json
          retention-days: 7

      - name: Send Telegram notification
        if: ${{ inputs.publish }}
        continue-on-error: true
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOOL_IMAGE: ${{ inputs.tool-image }}
          IMAGE_NAME: ${{ needs.plan.outputs.image_name }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            echo "::add-mask::$TELEGRAM_BOT_TOKEN"
          fi
          if [ -n "$TELEGRAM_CHAT_ID" ]; then
            echo "::add-mask::$TELEGRAM_CHAT_ID"
          fi

          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not configured; skipping release notification."
            exit 0
          fi

          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$TOOL_IMAGE" \
            render-telegram-notification release-record.json \
            --image-name "$IMAGE_NAME" \
            --repository "$REPOSITORY" \
            --server-url "$SERVER_URL" \
            --run-id "$RUN_ID" \
            > /tmp/telegram-message.txt

          if ! response="$(
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=$(cat /tmp/telegram-message.txt)" \
              --data-urlencode "parse_mode=Markdown" \
              --data-urlencode "disable_web_page_preview=true"
          )"; then
            echo "Telegram notification request failed" >&2
            exit 1
          fi

          jq -e '.ok == true' <<< "$response" > /dev/null
          echo "Telegram notification sent."
