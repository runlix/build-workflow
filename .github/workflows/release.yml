name: CI Release

on:
  workflow_call:
    inputs:
      config-path:
        description: Maintainer override for contract fixtures.
        required: false
        default: .ci/config.json
        type: string
      publish:
        description: Whether to push images, attest published manifests, and sync release.json.
        required: false
        default: true
        type: boolean
      tool-image:
        description: Immutable planner image reference pinned to a build-workflow digest or sha tag.
        required: true
        type: string
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false
      RUNLIX_APP_ID:
        required: false
      RUNLIX_PRIVATE_KEY:
        required: false

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  validate-inputs:
    name: validate-inputs
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    outputs:
      has_sync_credentials: ${{ steps.secret-shape.outputs.has_sync_credentials }}
      has_telegram_credentials: ${{ steps.secret-shape.outputs.has_telegram_credentials }}
      tool_image: ${{ steps.tool-image.outputs.value }}
    steps:
      - name: Validate tool image reference
        id: tool-image
        shell: bash
        env:
          TOOL_IMAGE: ${{ inputs.tool-image }}
        run: |
          set -euo pipefail

          if ! grep -Eq '^ghcr\.io/runlix/build-workflow-tools(@sha256:[0-9a-f]{64}|:sha-[0-9a-f]{40})$' <<< "$TOOL_IMAGE"; then
            echo "tool-image must be ghcr.io/runlix/build-workflow-tools pinned by digest or :sha-<40-char git sha>" >&2
            exit 1
          fi

          printf 'value=%s\n' "$TOOL_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Validate optional secret mapping
        id: secret-shape
        shell: bash
        env:
          RUNLIX_APP_ID: ${{ secrets.RUNLIX_APP_ID }}
          RUNLIX_PRIVATE_KEY: ${{ secrets.RUNLIX_PRIVATE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail

          has_sync_credentials=false
          if [ -n "$RUNLIX_APP_ID" ] || [ -n "$RUNLIX_PRIVATE_KEY" ]; then
            if [ -z "$RUNLIX_APP_ID" ] || [ -z "$RUNLIX_PRIVATE_KEY" ]; then
              echo "RUNLIX_APP_ID and RUNLIX_PRIVATE_KEY must be mapped together" >&2
              exit 1
            fi
            has_sync_credentials=true
          fi

          has_telegram_credentials=false
          if [ -n "$TELEGRAM_BOT_TOKEN" ] || [ -n "$TELEGRAM_CHAT_ID" ]; then
            if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
              echo "TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID must be mapped together" >&2
              exit 1
            fi
            has_telegram_credentials=true
          fi

          {
            printf 'has_sync_credentials=%s\n' "$has_sync_credentials"
            printf 'has_telegram_credentials=%s\n' "$has_telegram_credentials"
          } >> "$GITHUB_OUTPUT"

  plan:
    name: plan
    needs: validate-inputs
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    container:
      image: ${{ needs.validate-inputs.outputs.tool_image }}
    outputs:
      image_name: ${{ steps.validate.outputs.image_name }}
      manifests: ${{ steps.plan-manifests.outputs.manifests }}
      matrix: ${{ steps.plan.outputs.matrix }}
      short_sha: ${{ steps.context.outputs.short_sha }}
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Resolve source context
        id: context
        shell: bash
        run: |
          set -euo pipefail
          printf 'short_sha=%s\n' "${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Validate CI config
        id: validate
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          set -euo pipefail

          build-workflow-ci validate-config "$CONFIG_PATH" > /tmp/validate-config.json

          {
            printf 'image_name=%s\n' "$(jq -r '.image_name' /tmp/validate-config.json)"
            printf 'version=%s\n' "$(jq -r '.version // ""' /tmp/validate-config.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Plan build matrix
        id: plan
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
          SHORT_SHA: ${{ steps.context.outputs.short_sha }}
        run: |
          set -euo pipefail

          build-workflow-ci plan-matrix "$CONFIG_PATH" --short-sha "$SHORT_SHA" > /tmp/plan-matrix.json
          printf 'matrix=%s\n' "$(jq -c . /tmp/plan-matrix.json)" >> "$GITHUB_OUTPUT"

      - name: Plan manifests
        id: plan-manifests
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
          SHORT_SHA: ${{ steps.context.outputs.short_sha }}
        run: |
          set -euo pipefail

          build-workflow-ci plan-manifests "$CONFIG_PATH" --short-sha "$SHORT_SHA" > /tmp/plan-manifests.json
          printf 'manifests=%s\n' "$(jq -c . /tmp/plan-manifests.json)" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: build-and-push
    permissions:
      contents: read
      packages: write
    needs:
      - validate-inputs
      - plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Log in to GHCR
        if: ${{ inputs.publish }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Plan target build
        id: plan-build
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
          SHORT_SHA: ${{ needs.plan.outputs.short_sha }}
          TARGET_NAME: ${{ matrix.name }}
          TOOL_IMAGE: ${{ needs.validate-inputs.outputs.tool_image }}
        run: |
          set -euo pipefail

          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$TOOL_IMAGE" \
            plan-build-target "$CONFIG_PATH" \
            --target-name "$TARGET_NAME" \
            --mode release \
            --short-sha "$SHORT_SHA" \
            > /tmp/build-target-plan.json

          {
            printf 'image_tag=%s\n' "$(jq -r '.image_tag' /tmp/build-target-plan.json)"
            printf 'platform=%s\n' "$(jq -r '.platform' /tmp/build-target-plan.json)"
            printf 'test_script=%s\n' "$(jq -r '.test // ""' /tmp/build-target-plan.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Build target
        shell: bash
        run: |
          set -euo pipefail

          image_tag="$(jq -r '.image_tag' /tmp/build-target-plan.json)"
          platform="$(jq -r '.platform' /tmp/build-target-plan.json)"
          dockerfile="$(jq -r '.dockerfile' /tmp/build-target-plan.json)"
          context_dir="$(jq -r '.context_dir' /tmp/build-target-plan.json)"

          build_args=()
          while IFS=$'\t' read -r key value; do
            build_args+=(--build-arg "$key=$value")
          done < <(jq -r '.build_args | to_entries[] | [.key, .value] | @tsv' /tmp/build-target-plan.json)

          label_args=()
          while IFS=$'\t' read -r key value; do
            label_args+=(--label "$key=$value")
          done < <(jq -r '.labels | to_entries[] | [.key, .value] | @tsv' /tmp/build-target-plan.json)

          docker buildx build \
            --platform "$platform" \
            -f "$dockerfile" \
            "${build_args[@]}" \
            "${label_args[@]}" \
            --load \
            -t "$image_tag" \
            "$context_dir"

      - name: Run target test
        if: ${{ steps.plan-build.outputs.test_script != '' }}
        timeout-minutes: 10
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.plan-build.outputs.image_tag }}
          PLATFORM: ${{ steps.plan-build.outputs.platform }}
          TEST_SCRIPT: ${{ steps.plan-build.outputs.test_script }}
        run: |
          set -euo pipefail

          echo "Running test script: $TEST_SCRIPT"
          chmod +x "$TEST_SCRIPT"
          "$TEST_SCRIPT"

      - name: Push target image
        if: ${{ inputs.publish }}
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.plan-build.outputs.image_tag }}
        run: |
          set -euo pipefail
          docker push "$IMAGE_TAG"

  publish:
    name: publish
    permissions:
      contents: read
      packages: write
    needs:
      - validate-inputs
      - plan
      - build-and-push
    outputs:
      published_manifests: ${{ steps.manifest-metadata.outputs.payload }}
      release_json: ${{ steps.release-json.outputs.payload }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Log in to GHCR
        if: ${{ inputs.publish }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ inputs.publish }}
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Resolve publication timestamp
        id: published-at
        if: ${{ inputs.publish }}
        shell: bash
        run: |
          set -euo pipefail
          printf 'value=%s\n' "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

      - name: Create manifests and collect metadata
        id: manifest-metadata
        if: ${{ inputs.publish }}
        shell: bash
        env:
          IMAGE_NAME: ${{ needs.plan.outputs.image_name }}
          MANIFESTS_JSON: ${{ needs.plan.outputs.manifests }}
        run: |
          set -euo pipefail

          manifest_file="$RUNNER_TEMP/published-manifests.json"
          printf '[]\n' > "$manifest_file"

          while IFS= read -r manifest; do
            [ -n "$manifest" ] || continue

            tag="$(jq -r '.tag' <<< "$manifest")"
            mapfile -t refs < <(jq -r '.refs[]' <<< "$manifest")
            final_ref="${IMAGE_NAME}:${tag}"

            echo "Creating manifest for $final_ref"
            docker buildx imagetools create -t "$final_ref" "${refs[@]}"

            digest="$(docker buildx imagetools inspect "$final_ref" --format '{{json .Manifest}}' | jq -r '.digest')"
            platforms="$(jq -c '.platforms' <<< "$manifest")"

            jq \
              --arg tag "$tag" \
              --arg digest "$digest" \
              --argjson platforms "$platforms" \
              '. += [{tag: $tag, digest: $digest, platforms: $platforms}]' \
              "$manifest_file" \
              > "${manifest_file}.tmp"
            mv "${manifest_file}.tmp" "$manifest_file"
          done < <(jq -c '.[]' <<< "$MANIFESTS_JSON")

          payload="$(jq -c 'sort_by(.tag)' "$manifest_file")"
          printf 'payload=%s\n' "$payload" >> "$GITHUB_OUTPUT"

      - name: Render release.json
        id: release-json
        if: ${{ inputs.publish }}
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
          MANIFESTS_PAYLOAD: ${{ steps.manifest-metadata.outputs.payload }}
          PUBLISHED_AT: ${{ steps.published-at.outputs.value }}
          SOURCE_SHA: ${{ github.sha }}
          TOOL_IMAGE: ${{ needs.validate-inputs.outputs.tool_image }}
        run: |
          set -euo pipefail

          manifest_file="$RUNNER_TEMP/published-manifests.json"
          printf '%s\n' "$MANIFESTS_PAYLOAD" > "$manifest_file"

          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -v "$RUNNER_TEMP:$RUNNER_TEMP" \
            "$TOOL_IMAGE" \
            render-release-json "$CONFIG_PATH" \
            --source-sha "$SOURCE_SHA" \
            --published-at "$PUBLISHED_AT" \
            --manifests-path "$manifest_file" \
            > release.json

          printf 'payload=%s\n' "$(jq -c . release.json)" >> "$GITHUB_OUTPUT"

      - name: Validate release.json
        if: ${{ inputs.publish }}
        shell: bash
        env:
          TOOL_IMAGE: ${{ needs.validate-inputs.outputs.tool_image }}
        run: |
          set -euo pipefail

          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$TOOL_IMAGE" \
            validate-release-json release.json

      - name: Upload release.json artifact
        if: ${{ inputs.publish }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: release-json
          path: release.json
          retention-days: 7

      - name: Send Telegram notification
        if: ${{ inputs.publish && needs.validate-inputs.outputs.has_telegram_credentials == 'true' }}
        continue-on-error: true
        shell: bash
        env:
          RELEASE_JSON_PATH: release.json
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOOL_IMAGE: ${{ needs.validate-inputs.outputs.tool_image }}
        run: |
          set -euo pipefail

          echo "::add-mask::$TELEGRAM_BOT_TOKEN"
          echo "::add-mask::$TELEGRAM_CHAT_ID"

          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$TOOL_IMAGE" \
            render-telegram-notification "$RELEASE_JSON_PATH" \
            --repository "$REPOSITORY" \
            --server-url "$SERVER_URL" \
            --run-id "$RUN_ID" \
            > /tmp/telegram-message.txt

          if ! response="$(
            curl --fail-with-body -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=$(cat /tmp/telegram-message.txt)" \
              --data-urlencode "parse_mode=Markdown" \
              --data-urlencode "disable_web_page_preview=true"
          )"; then
            echo "Telegram notification request failed" >&2
            exit 1
          fi

          jq -e '.ok == true' <<< "$response" > /dev/null
          echo "Telegram notification sent."

  attest:
    name: attest
    if: ${{ inputs.publish }}
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    needs:
      - plan
      - publish
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.publish.outputs.published_manifests) }}
    steps:
      - name: Attest published manifest
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-name: ${{ needs.plan.outputs.image_name }}
          subject-digest: ${{ matrix.digest }}
          push-to-registry: true

  sync-main:
    name: sync-main
    if: ${{ inputs.publish && needs.validate-inputs.outputs.has_sync_credentials == 'true' }}
    needs:
      - attest
      - publish
      - validate-inputs
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RUNLIX_APP_ID }}
          private-key: ${{ secrets.RUNLIX_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout metadata branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - name: Stage metadata update on sync branch
        id: sync-branch
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_JSON: ${{ needs.publish.outputs.release_json }}
          SYNC_BRANCH: automation/sync-release-json
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          export GH_TOKEN="$APP_TOKEN"
          gh auth setup-git

          git fetch --no-tags origin main
          git switch -C "$SYNC_BRANCH" origin/main

          jq . <<< "$RELEASE_JSON" > release.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release.json

          if git diff --staged --quiet; then
            echo "No metadata changes to commit"
            printf 'has_changes=false\n' >> "$GITHUB_OUTPUT"
            printf 'sync_branch=%s\n' "$SYNC_BRANCH" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="$(jq -r '.version // ""' release.json)"
          short_sha="$(jq -r '.short_sha' release.json)"
          service_name="${GITHUB_REPOSITORY##*/}"

          if [ -n "$version" ]; then
            commit_title="Release: ${service_name} ${version} @ ${short_sha}"
          else
            commit_title="Release: ${service_name} @ ${short_sha}"
          fi

          git commit -m "$commit_title"
          git push --force-with-lease origin "HEAD:${SYNC_BRANCH}"

          printf 'has_changes=true\n' >> "$GITHUB_OUTPUT"
          printf 'sync_branch=%s\n' "$SYNC_BRANCH" >> "$GITHUB_OUTPUT"
          printf 'commit_sha=%s\n' "$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          printf 'commit_title=%s\n' "$commit_title" >> "$GITHUB_OUTPUT"

      - name: Close stale sync PR
        if: ${{ steps.sync-branch.outputs.has_changes != 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SYNC_BRANCH: ${{ steps.sync-branch.outputs.sync_branch }}
        shell: bash
        run: |
          set -euo pipefail

          pr_number="$(gh pr list --base main --head "$SYNC_BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [ -z "$pr_number" ]; then
            echo "No open sync PR to close"
            exit 0
          fi

          gh pr close "$pr_number" --comment "Closing stale sync PR because \`release.json\` already matches \`main\`."

      - name: Create or update sync PR
        id: sync-pr
        if: ${{ steps.sync-branch.outputs.has_changes == 'true' }}
        env:
          COMMIT_TITLE: ${{ steps.sync-branch.outputs.commit_title }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SOURCE_RUN_ID: ${{ github.run_id }}
          SOURCE_SHA: ${{ github.sha }}
          SYNC_BRANCH: ${{ steps.sync-branch.outputs.sync_branch }}
        shell: bash
        run: |
          set -euo pipefail

          body_file="${RUNNER_TEMP}/sync-pr-body.md"
          {
            echo "Automated update of \`release.json\` from a successful release run."
            echo ""
            echo "- Source workflow run: https://github.com/${{ github.repository }}/actions/runs/${SOURCE_RUN_ID}"
            echo "- Source commit: \`${SOURCE_SHA}\`"
            echo "- Sync branch: \`${SYNC_BRANCH}\`"
          } > "$body_file"

          pr_number="$(gh pr list --base main --head "$SYNC_BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --title "$COMMIT_TITLE" --body-file "$body_file"
          else
            gh pr create --base main --head "$SYNC_BRANCH" --title "$COMMIT_TITLE" --body-file "$body_file" > /dev/null
            pr_number="$(gh pr list --base main --head "$SYNC_BRANCH" --state open --json number --jq '.[0].number // empty')"
          fi

          [ -n "$pr_number" ] || {
            echo "Failed to resolve sync PR number" >&2
            exit 1
          }

          printf 'number=%s\n' "$pr_number" >> "$GITHUB_OUTPUT"
          printf 'url=%s\n' "$(gh pr view "$pr_number" --json url --jq '.url')" >> "$GITHUB_OUTPUT"

      - name: Enable sync PR merge
        if: ${{ steps.sync-branch.outputs.has_changes == 'true' }}
        env:
          COMMIT_SHA: ${{ steps.sync-branch.outputs.commit_sha }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.sync-pr.outputs.number }}
        shell: bash
        run: |
          set -euo pipefail

          auto_merge_enabled="$(gh pr view "$PR_NUMBER" --json autoMergeRequest --jq '.autoMergeRequest != null')"
          if [ "$auto_merge_enabled" = "true" ]; then
            echo "Sync PR auto-merge is already enabled"
            exit 0
          fi

          gh pr merge "$PR_NUMBER" --auto --merge --delete-branch --match-head-commit "$COMMIT_SHA"

      - name: Summarize sync PR state
        shell: bash
        env:
          HAS_CHANGES: ${{ steps.sync-branch.outputs.has_changes }}
          PR_NUMBER: ${{ steps.sync-pr.outputs.number }}
          PR_URL: ${{ steps.sync-pr.outputs.url }}
          SYNC_BRANCH: ${{ steps.sync-branch.outputs.sync_branch }}
        run: |
          set -euo pipefail

          {
            echo "## Sync PR"
            echo ""
            echo "- Sync branch: \`$SYNC_BRANCH\`"
            if [ "$HAS_CHANGES" = "true" ]; then
              echo "- PR: [#$PR_NUMBER]($PR_URL)"
              echo "- Merge mode: \`merge\` via bot-authored pull request"
            else
              echo "- Result: \`release.json\` already matched \`main\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
