name: CI Release

on:
  workflow_call:
    inputs:
      build-workflow-ref:
        description: Full commit SHA for the build-workflow revision to load internal actions from.
        required: true
        type: string
      config-path:
        description: Path to the CI config file in the caller repository.
        required: false
        default: .ci/config.json
        type: string
      context-dir:
        description: Docker build context directory in the caller repository.
        required: false
        default: .
        type: string
      publish:
        description: Whether to push images and upload release metadata.
        required: false
        default: true
        type: boolean

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  plan:
    name: plan
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    outputs:
      short_sha: ${{ steps.context.outputs.short_sha }}
      image_name: ${{ steps.validate.outputs.image_name }}
      version: ${{ steps.validate.outputs.version }}
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate build-workflow ref
        shell: bash
        env:
          BUILD_WORKFLOW_REF: ${{ inputs.build-workflow-ref }}
        run: |
          set -euo pipefail

          [[ "$BUILD_WORKFLOW_REF" =~ ^[a-f0-9]{40}$ ]] || {
            echo "build-workflow-ref must be a full 40-character commit SHA" >&2
            exit 1
          }

      - name: Checkout build-workflow tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: runlix/build-workflow
          ref: ${{ inputs.build-workflow-ref }}
          path: .build-workflow

      - name: Resolve source context
        id: context
        shell: bash
        run: |
          set -euo pipefail
          printf 'short_sha=%s\n' "${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Validate CI config
        id: validate
        uses: ./.build-workflow/.github/actions/internal/ci/validate-config
        with:
          config-path: ${{ inputs.config-path }}

      - name: Plan build matrix
        id: plan
        uses: ./.build-workflow/.github/actions/internal/ci/plan-matrix
        with:
          config-path: ${{ inputs.config-path }}
          short-sha: ${{ steps.context.outputs.short_sha }}

  build-and-push:
    name: build-and-push
    permissions:
      contents: read
      packages: write
    needs: plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate build-workflow ref
        shell: bash
        env:
          BUILD_WORKFLOW_REF: ${{ inputs.build-workflow-ref }}
        run: |
          set -euo pipefail

          [[ "$BUILD_WORKFLOW_REF" =~ ^[a-f0-9]{40}$ ]] || {
            echo "build-workflow-ref must be a full 40-character commit SHA" >&2
            exit 1
          }

      - name: Checkout build-workflow tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: runlix/build-workflow
          ref: ${{ inputs.build-workflow-ref }}
          path: .build-workflow

      - name: Log in to GHCR
        if: ${{ inputs.publish }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build target
        id: build-target
        uses: ./.build-workflow/.github/actions/internal/ci/build-target
        with:
          config-path: ${{ inputs.config-path }}
          target-name: ${{ matrix.name }}
          mode: release
          short-sha: ${{ needs.plan.outputs.short_sha }}
          context-dir: ${{ inputs.context-dir }}

      - name: Run target test
        if: ${{ matrix.test != '' }}
        timeout-minutes: 10
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.build-target.outputs.image_tag }}
          PLATFORM: ${{ steps.build-target.outputs.platform }}
          TEST_SCRIPT: ${{ matrix.test }}
        run: |
          set -euo pipefail

          echo "Running test script: $TEST_SCRIPT"
          chmod +x "$TEST_SCRIPT"
          "$TEST_SCRIPT"

      - name: Push target image
        if: ${{ inputs.publish }}
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.build-target.outputs.image_tag }}
        run: |
          set -euo pipefail
          docker push "$IMAGE_TAG"

  publish:
    name: publish
    permissions:
      contents: read
      packages: write
    needs:
      - plan
      - build-and-push
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate build-workflow ref
        shell: bash
        env:
          BUILD_WORKFLOW_REF: ${{ inputs.build-workflow-ref }}
        run: |
          set -euo pipefail

          [[ "$BUILD_WORKFLOW_REF" =~ ^[a-f0-9]{40}$ ]] || {
            echo "build-workflow-ref must be a full 40-character commit SHA" >&2
            exit 1
          }

      - name: Checkout build-workflow tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: runlix/build-workflow
          ref: ${{ inputs.build-workflow-ref }}
          path: .build-workflow

      - name: Log in to GHCR
        if: ${{ inputs.publish }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ inputs.publish }}
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Resolve publication timestamp
        id: published-at
        shell: bash
        run: |
          set -euo pipefail
          printf 'value=%s\n' "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

      - name: Create manifests
        if: ${{ inputs.publish }}
        uses: ./.build-workflow/.github/actions/internal/ci/create-manifests
        with:
          config-path: ${{ inputs.config-path }}
          short-sha: ${{ needs.plan.outputs.short_sha }}

      - name: Render release metadata
        id: release-metadata
        uses: ./.build-workflow/.github/actions/internal/ci/render-release-metadata
        with:
          config-path: ${{ inputs.config-path }}
          source-sha: ${{ github.sha }}
          published-at: ${{ steps.published-at.outputs.value }}

      - name: Validate release metadata
        uses: ./.build-workflow/.github/actions/internal/ci/validate-release-record
        with:
          json-path: ${{ steps.release-metadata.outputs.metadata-path }}

      - name: Upload release metadata
        if: ${{ inputs.publish }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: release-metadata
          path: ${{ steps.release-metadata.outputs.metadata-path }}
          retention-days: 7
