name: Publish CI Tool Image

on:
  push:
    branches:
      - main
  workflow_call:
    outputs:
      digest:
        description: Digest of the published immutable tool image.
        value: ${{ jobs.publish-immutable.outputs.digest }}
      tool_image:
        description: Immutable GHCR tag for the current commit tool image.
        value: ${{ jobs.publish-immutable.outputs.tool_image }}
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-immutable:
    name: publish-immutable
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tool_image: ${{ steps.meta.outputs.tool_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Resolve immutable tool image tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          printf 'tool_image=ghcr.io/runlix/build-workflow-tools:sha-%s\n' "$GITHUB_SHA" >> "$GITHUB_OUTPUT"

      - name: Build and push immutable tool image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: tools/ci/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tool_image }}

      - name: Summarize immutable tool image refs
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## Published CI Tool Image"
            echo ""
            echo "- Git SHA tag: \`${{ steps.meta.outputs.tool_image }}\`"
            echo "- Digest ref: \`ghcr.io/runlix/build-workflow-tools@${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
