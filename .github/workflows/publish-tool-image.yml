name: Publish CI Tool Image

on:
  push:
    branches:
      - main
      - side/**
      - refactor/**
    paths:
      - 'tools/ci/**'
      - 'schema/ci-config.schema.json'
      - 'schema/release-record.schema.json'
      - '.github/workflows/publish-tool-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: publish
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build and push tool image
        shell: bash
        env:
          IMAGE_NAME: ghcr.io/runlix/build-workflow-tools
        run: |
          set -euo pipefail

          tags=(
            -t "${IMAGE_NAME}:sha-${GITHUB_SHA}"
          )

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            tags+=(-t "${IMAGE_NAME}:ci")
          fi

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f tools/ci/Dockerfile \
            "${tags[@]}" \
            --push \
            .
