name: Publish CI Tool Image

on:
  push:
    branches:
      - main
      - side/**
      - refactor/**
    paths:
      - 'tools/ci/**'
      - 'schema/ci-config.schema.json'
      - 'schema/release-record.schema.json'
      - '.github/workflows/publish-tool-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: publish
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Set tool image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          {
            echo 'value<<EOF'
            echo "ghcr.io/runlix/build-workflow-tools:sha-${GITHUB_SHA}"
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "ghcr.io/runlix/build-workflow-tools:ci"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push tool image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: tools/ci/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.value }}

      - name: Summarize immutable tool image refs
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## Published CI Tool Image"
            echo ""
            echo "- Git SHA tag: \`ghcr.io/runlix/build-workflow-tools:sha-${GITHUB_SHA}\`"
            echo "- Digest ref: \`ghcr.io/runlix/build-workflow-tools@${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
