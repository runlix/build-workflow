name: CI v2 Release

on:
  workflow_call:
    inputs:
      config-path:
        description: Path to the CI v2 config file in the caller repository.
        required: false
        default: .ci/config.json
        type: string
      context-dir:
        description: Docker build context directory in the caller repository.
        required: false
        default: .
        type: string

jobs:
  release:
    name: release
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/release-v2-internal.yml
    with:
      config-path: ${{ inputs.config-path }}
      context-dir: ${{ inputs.context-dir }}
      publish: true
    secrets: inherit
