name: CI v2 Release

on:
  workflow_call:
    inputs:
      config-path:
        description: Path to the CI v2 config file in the caller repository.
        required: false
        default: .ci/config.json
        type: string
      context-dir:
        description: Docker build context directory in the caller repository.
        required: false
        default: .
        type: string
      release-artifact-name:
        description: Artifact name used for the rendered release metadata JSON.
        required: false
        default: release-metadata
        type: string

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  plan:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      short_sha: ${{ steps.context.outputs.short_sha }}
      source_sha: ${{ steps.context.outputs.source_sha }}
      published_at: ${{ steps.context.outputs.published_at }}
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve source context
        id: context
        shell: bash
        run: |
          published_at="${{ github.event.head_commit.timestamp }}"
          if [ -z "$published_at" ] || [ "$published_at" = "null" ]; then
            published_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          fi

          echo "source_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "published_at=$published_at" >> "$GITHUB_OUTPUT"

      - name: Validate CI config
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          set -euo pipefail

          if [ ! -f "$CONFIG_PATH" ]; then
            echo "Config file not found: $CONFIG_PATH" >&2
            exit 1
          fi

          jq empty "$CONFIG_PATH" > /dev/null

          jq -e '
            (.image | type == "string" and length > 0) and
            ((has("version") | not) or (.version | type == "string" and length > 0)) and
            (.targets | type == "array" and length > 0) and
            all(.targets[];
              (.name | type == "string" and test("^[a-z0-9-]+$")) and
              (.tag | type == "string" and test("^[A-Za-z0-9][A-Za-z0-9._-]*$")) and
              (.arch == "amd64" or .arch == "arm64") and
              (.dockerfile | type == "string" and length > 0) and
              (.base_ref | type == "string" and test("^.+:.+@sha256:[a-f0-9]{64}$")) and
              ((.test // "") | type == "string") and
              ((.enabled // true) | type == "boolean") and
              ((.build_args // {}) | type == "object") and
              all((.build_args // {}) | to_entries[]?;
                (.key | test("^[A-Z_][A-Z0-9_]*$")) and
                (.value | type == "string")
              )
            )
          ' "$CONFIG_PATH" > /dev/null

          duplicate_names="$(jq -r '.targets[].name' "$CONFIG_PATH" | sort | uniq -d)"
          if [ -n "$duplicate_names" ]; then
            echo "Duplicate target names detected:" >&2
            echo "$duplicate_names" >&2
            exit 1
          fi

          duplicate_tag_arch_pairs="$(
            jq -r '.targets[] | select(.enabled // true) | [.tag, .arch] | @tsv' "$CONFIG_PATH" |
              sort |
              uniq -d
          )"
          if [ -n "$duplicate_tag_arch_pairs" ]; then
            echo "Duplicate enabled tag/arch pairs detected:" >&2
            echo "$duplicate_tag_arch_pairs" >&2
            exit 1
          fi

          while IFS=$'\t' read -r target_name dockerfile test_script; do
            if [ ! -f "$dockerfile" ]; then
              echo "Target '$target_name' references a missing Dockerfile: $dockerfile" >&2
              exit 1
            fi

            if [ -n "$test_script" ] && [ ! -f "$test_script" ]; then
              echo "Target '$target_name' references a missing test script: $test_script" >&2
              exit 1
            fi
          done < <(
            jq -r '.targets[] | select(.enabled // true) | [.name, .dockerfile, (.test // "")] | @tsv' "$CONFIG_PATH"
          )

          enabled_count="$(jq '[.targets[] | select(.enabled // true)] | length' "$CONFIG_PATH")"
          if [ "$enabled_count" -eq 0 ]; then
            echo "At least one target must be enabled" >&2
            exit 1
          fi

          enabled_tags="$(jq -r '[.targets[] | select(.enabled // true) | .tag] | unique | join(", ")' "$CONFIG_PATH")"
          image_name="$(jq -r '.image' "$CONFIG_PATH")"
          version_text="$(jq -r '.version // ""' "$CONFIG_PATH")"

          echo "Validated $enabled_count enabled target(s) for $image_name"
          if [ -n "$version_text" ]; then
            echo "Version: $version_text"
          else
            echo "Version: <omitted>"
          fi
          echo "Manifest tags: $enabled_tags"

      - name: Plan build matrix
        id: plan
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
          SHORT_SHA: ${{ steps.context.outputs.short_sha }}
        run: |
          set -euo pipefail

          matrix="$(
            jq -c --arg short_sha "$SHORT_SHA" '
              . as $root
              | [
                  .targets[]
                  | select(.enabled // true)
                  | {
                      name,
                      image: $root.image,
                      version: ($root.version // ""),
                      tag,
                      arch,
                      platform: ("linux/" + .arch),
                      runner: (
                        if .arch == "arm64" then
                          "ubuntu-24.04-arm"
                        else
                          "ubuntu-24.04"
                        end
                      ),
                      dockerfile,
                      base_ref,
                      test: (.test // ""),
                      build_args: (.build_args // {}),
                      pr_local_tag: ("pr-" + $short_sha + "-" + .name),
                      release_temp_tag: (.tag + "-" + .arch + "-" + $short_sha)
                    }
                ]
            ' "$CONFIG_PATH"
          )"

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build-and-push:
    permissions:
      contents: read
      packages: write
    needs: plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build target
        shell: bash
        env:
          IMAGE_NAME: ${{ matrix.image }}
          VERSION: ${{ matrix.version }}
          TARGET_NAME: ${{ matrix.name }}
          ARCH: ${{ matrix.arch }}
          PLATFORM: ${{ matrix.platform }}
          DOCKERFILE: ${{ matrix.dockerfile }}
          BASE_REF: ${{ matrix.base_ref }}
          BUILD_ARGS_JSON: ${{ toJson(matrix.build_args) }}
          RELEASE_TEMP_TAG: ${{ matrix.release_temp_tag }}
          CONTEXT_DIR: ${{ inputs.context-dir }}
        run: |
          set -euo pipefail

          build_date="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          image_tag="${IMAGE_NAME}:${RELEASE_TEMP_TAG}"

          base_no_digest="${BASE_REF%@*}"
          if [ "$base_no_digest" = "$BASE_REF" ]; then
            echo "base_ref must include a digest: $BASE_REF" >&2
            exit 1
          fi

          base_digest="${BASE_REF#*@}"
          base_image="${base_no_digest%:*}"
          base_tag="${base_no_digest##*:}"

          build_args=(
            --build-arg "BASE_IMAGE=$base_image"
            --build-arg "BASE_TAG=$base_tag"
            --build-arg "BASE_DIGEST=$base_digest"
          )

          while IFS=$'\t' read -r key value; do
            [ -n "$key" ] || continue
            build_args+=(--build-arg "$key=$value")
          done < <(jq -r 'to_entries[]? | [.key, .value] | @tsv' <<< "$BUILD_ARGS_JSON")

          label_args=(
            --label "org.opencontainers.image.created=$build_date"
            --label "org.opencontainers.image.revision=${GITHUB_SHA}"
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          )
          if [ -n "$VERSION" ]; then
            label_args+=(--label "org.opencontainers.image.version=$VERSION")
          fi

          echo "Building target '$TARGET_NAME'"
          echo "  Image: $image_tag"
          echo "  Platform: $PLATFORM"
          echo "  Dockerfile: $DOCKERFILE"

          docker buildx build \
            --platform "$PLATFORM" \
            -f "$DOCKERFILE" \
            "${build_args[@]}" \
            "${label_args[@]}" \
            --load \
            -t "$image_tag" \
            "$CONTEXT_DIR"

          echo "IMAGE_TAG=$image_tag" >> "$GITHUB_ENV"
          echo "PLATFORM=$PLATFORM" >> "$GITHUB_ENV"

      - name: Run target test
        if: ${{ matrix.test != '' }}
        timeout-minutes: 10
        shell: bash
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          PLATFORM: ${{ env.PLATFORM }}
          TEST_SCRIPT: ${{ matrix.test }}
        run: |
          set -euo pipefail

          echo "Running test script: $TEST_SCRIPT"
          chmod +x "$TEST_SCRIPT"
          "$TEST_SCRIPT"

      - name: Push target image
        shell: bash
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail
          docker push "$IMAGE_TAG"

  publish:
    permissions:
      contents: read
      packages: write
    needs:
      - plan
      - build-and-push
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Create manifests
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
          SHORT_SHA: ${{ needs.plan.outputs.short_sha }}
        run: |
          set -euo pipefail

          image_name="$(jq -r '.image' "$CONFIG_PATH")"

          while IFS= read -r manifest_tag; do
            [ -n "$manifest_tag" ] || continue

            refs=()
            while IFS=$'\t' read -r arch _target_name; do
              refs+=("${image_name}:${manifest_tag}-${arch}-${SHORT_SHA}")
            done < <(
              jq -r --arg tag "$manifest_tag" '
                .targets[]
                | select((.enabled // true) and .tag == $tag)
                | [.arch, .name]
                | @tsv
              ' "$CONFIG_PATH"
            )

            if [ "${#refs[@]}" -eq 0 ]; then
              echo "No platform images discovered for manifest tag: $manifest_tag" >&2
              exit 1
            fi

            echo "Creating manifest ${image_name}:${manifest_tag}"
            docker buildx imagetools create -t "${image_name}:${manifest_tag}" "${refs[@]}"
          done < <(jq -r '.targets[] | select(.enabled // true) | .tag' "$CONFIG_PATH" | sort -u)

      - name: Render release metadata
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
          SOURCE_SHA: ${{ needs.plan.outputs.source_sha }}
          PUBLISHED_AT: ${{ needs.plan.outputs.published_at }}
        run: |
          set -euo pipefail

          image_name="$(jq -r '.image' "$CONFIG_PATH")"
          service_name="${image_name##*/}"
          version="$(jq -r '.version // ""' "$CONFIG_PATH")"
          short_sha="$(printf '%s' "$SOURCE_SHA" | cut -c1-7)"
          tags_json="$(jq '[.targets[] | select(.enabled // true) | .tag] | unique' "$CONFIG_PATH")"

          jq -n \
            --arg service "$service_name" \
            --arg version "$version" \
            --arg sha "$SOURCE_SHA" \
            --arg short_sha "$short_sha" \
            --arg published_at "$PUBLISHED_AT" \
            --argjson tags "$tags_json" \
            '{
              service: $service,
              version: (if $version == "" then null else $version end),
              sha: $sha,
              short_sha: $short_sha,
              published_at: $published_at,
              tags: $tags
            }' > release-metadata.json

      - name: Upload release metadata
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ inputs.release-artifact-name }}
          path: release-metadata.json
          retention-days: 7
