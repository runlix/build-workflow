name: CI v2 Release

on:
  workflow_call:
    inputs:
      tooling-ref:
        description: Full build-workflow commit SHA that should be used for internal action checkout.
        required: true
        type: string
      config-path:
        description: Path to the CI v2 config file in the caller repository.
        required: false
        default: .ci/config.json
        type: string
      context-dir:
        description: Docker build context directory in the caller repository.
        required: false
        default: .
        type: string
      validate-legacy-matrix:
        description: Whether to parse the legacy docker-matrix.json during rollout.
        required: false
        default: false
        type: boolean
      legacy-matrix-path:
        description: Path to the legacy docker-matrix.json file in the caller repository.
        required: false
        default: ""
        type: string
      release-artifact-name:
        description: Artifact name used for the rendered release metadata JSON.
        required: false
        default: release-metadata
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      short_sha: ${{ steps.context.outputs.short_sha }}
      source_sha: ${{ steps.context.outputs.source_sha }}
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout build workflow internals
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: runlix/build-workflow
          ref: ${{ inputs.tooling-ref }}
          path: .build-workflow
          persist-credentials: false

      - name: Resolve source context
        id: context
        run: |
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Validate CI config
        uses: ./.build-workflow/.github/actions/ci-v2/validate-config
        with:
          config-path: ${{ inputs.config-path }}

      - name: Validate legacy matrix JSON
        if: ${{ inputs.validate-legacy-matrix && inputs.legacy-matrix-path != '' }}
        run: jq empty "${{ inputs.legacy-matrix-path }}" > /dev/null

      - name: Plan build matrix
        id: plan
        uses: ./.build-workflow/.github/actions/ci-v2/plan-matrix
        with:
          config-path: ${{ inputs.config-path }}
          short-sha: ${{ steps.context.outputs.short_sha }}

  build-and-push:
    needs: plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout build workflow internals
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: runlix/build-workflow
          ref: ${{ inputs.tooling-ref }}
          path: .build-workflow
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build and push target
        uses: ./.build-workflow/.github/actions/ci-v2/build-target
        with:
          config-path: ${{ inputs.config-path }}
          target-name: ${{ matrix.name }}
          mode: release
          short-sha: ${{ needs.plan.outputs.short_sha }}
          context-dir: ${{ inputs.context-dir }}

  publish:
    needs:
      - plan
      - build-and-push
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout build workflow internals
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: runlix/build-workflow
          ref: ${{ inputs.tooling-ref }}
          path: .build-workflow
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Create manifests
        uses: ./.build-workflow/.github/actions/ci-v2/create-manifests
        with:
          config-path: ${{ inputs.config-path }}
          short-sha: ${{ needs.plan.outputs.short_sha }}
          output-file: manifests-created.txt

      - name: Render release metadata
        uses: ./.build-workflow/.github/actions/ci-v2/render-release-metadata
        with:
          config-path: ${{ inputs.config-path }}
          source-sha: ${{ needs.plan.outputs.source_sha }}
          published-at: ${{ github.event.head_commit.timestamp }}
          output-path: release-metadata.json

      - name: Upload release metadata
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ inputs.release-artifact-name }}
          path: release-metadata.json
          retention-days: 7
