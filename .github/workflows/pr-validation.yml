name: CI PR Validation

on:
  workflow_call:
    inputs:
      config-path:
        description: Path to the CI config file in the caller repository.
        required: false
        default: .ci/config.json
        type: string
      context-dir:
        description: Docker build context directory in the caller repository.
        required: false
        default: .
        type: string

concurrency:
  group: pr-validation-${{ github.repository }}-${{ github.ref }}-${{ inputs.config-path }}
  cancel-in-progress: true

jobs:
  plan:
    name: plan
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      short_sha: ${{ steps.context.outputs.short_sha }}
      image_name: ${{ steps.validate.outputs.image_name }}
      version: ${{ steps.validate.outputs.version }}
      enabled_count: ${{ steps.validate.outputs.enabled_count }}
      manifest_tags: ${{ steps.validate.outputs.manifest_tags }}
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve workflow source
        id: workflow-source
        shell: bash
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          set -euo pipefail

          workflow_repository="${WORKFLOW_REF%%/.github/workflows/*}"

          {
            printf 'repository=%s\n' "$workflow_repository"
            printf 'sha=%s\n' "$WORKFLOW_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout workflow repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ steps.workflow-source.outputs.repository }}
          ref: ${{ steps.workflow-source.outputs.sha }}
          path: .build-workflow

      - name: Resolve source context
        id: context
        shell: bash
        run: |
          set -euo pipefail
          printf 'short_sha=%s\n' "${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Validate CI config
        id: validate
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          set -euo pipefail
          bash .build-workflow/scripts/ci/validate-config.sh "$CONFIG_PATH"

      - name: Plan build matrix
        id: plan
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
          SHORT_SHA: ${{ steps.context.outputs.short_sha }}
        run: |
          set -euo pipefail

          matrix="$(bash .build-workflow/scripts/ci/plan-matrix.sh "$CONFIG_PATH" "$SHORT_SHA")"
          printf 'matrix=%s\n' "$matrix" >> "$GITHUB_OUTPUT"

  build:
    name: build
    permissions:
      contents: read
    needs: plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve workflow source
        id: workflow-source
        shell: bash
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          set -euo pipefail

          workflow_repository="${WORKFLOW_REF%%/.github/workflows/*}"

          {
            printf 'repository=%s\n' "$workflow_repository"
            printf 'sha=%s\n' "$WORKFLOW_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout workflow repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ steps.workflow-source.outputs.repository }}
          ref: ${{ steps.workflow-source.outputs.sha }}
          path: .build-workflow

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build target
        id: build-target
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
          TARGET_NAME: ${{ matrix.name }}
          SHORT_SHA: ${{ needs.plan.outputs.short_sha }}
          CONTEXT_DIR: ${{ inputs.context-dir }}
        run: |
          set -euo pipefail
          bash .build-workflow/scripts/ci/build-target.sh "$CONFIG_PATH" "$TARGET_NAME" pr "$SHORT_SHA" "$CONTEXT_DIR"

      - name: Run target test
        if: ${{ matrix.test != '' }}
        timeout-minutes: 10
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.build-target.outputs.image_tag }}
          PLATFORM: ${{ steps.build-target.outputs.platform }}
          TEST_SCRIPT: ${{ matrix.test }}
        run: |
          set -euo pipefail

          echo "Running test script: $TEST_SCRIPT"
          chmod +x "$TEST_SCRIPT"
          "$TEST_SCRIPT"

  summary:
    name: summary
    permissions:
      contents: read
    needs:
      - plan
      - build
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Generate validation summary
        shell: bash
        env:
          PLAN_RESULT: ${{ needs.plan.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          SHORT_SHA: ${{ needs.plan.outputs.short_sha }}
          IMAGE_NAME: ${{ needs.plan.outputs.image_name }}
          MATRIX_JSON: ${{ needs.plan.outputs.matrix }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          {
            echo "## PR Validation Summary"
            echo ""
            echo "- Repository: \`$REPOSITORY\`"
            echo "- Commit: \`$SHORT_SHA\`"
            echo "- Plan result: \`$PLAN_RESULT\`"
            echo "- Build result: \`$BUILD_RESULT\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$PLAN_RESULT" = "success" ] && [ -n "${MATRIX_JSON:-}" ]; then
            target_count="$(jq 'length' <<< "$MATRIX_JSON")"
            manifest_tags="$(jq -r '[.[].tag] | unique | join(", ")' <<< "$MATRIX_JSON")"

            {
              echo "### Build Plan"
              echo ""
              echo "- Image: \`$IMAGE_NAME\`"
              echo "- Enabled targets: \`$target_count\`"
              echo "- Manifest tags: \`$manifest_tags\`"
              echo ""
              echo "| Target | Arch | Tag | Dockerfile | Test |"
              echo "| --- | --- | --- | --- | --- |"
              jq -r '
                .[]
                | "| \(.name) | \(.arch) | \(.tag) | \(.dockerfile) | "
                  + (if (.test // "") == "" then "no" else "yes" end)
                  + " |"
              ' <<< "$MATRIX_JSON"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "[View workflow run]($RUN_URL)" >> "$GITHUB_STEP_SUMMARY"

          if [ "$PLAN_RESULT" != "success" ]; then
            echo "Validation or matrix planning failed." >&2
            exit 1
          fi

          if [ "$BUILD_RESULT" != "success" ]; then
            echo "One or more target builds or tests failed." >&2
            exit 1
          fi
