name: CI Validate Sync Wrapper

on:
  workflow_call:
    inputs:
      workflow-path:
        description: Path to the caller sync wrapper file.
        required: false
        default: .github/workflows/sync-release-record.yml
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: validate
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Validate sync wrapper contract
        shell: bash
        env:
          WORKFLOW_PATH: ${{ inputs.workflow-path }}
        run: |
          set -euo pipefail

          python3 - <<'PY' > /tmp/validated-sync-wrapper.json
          import json
          import os
          import re
          import sys
          from pathlib import Path

          workflow_path = Path(os.environ["WORKFLOW_PATH"])
          if not workflow_path.is_file():
            print(f"sync wrapper file not found: {workflow_path}", file=sys.stderr)
            sys.exit(1)

          workflow = workflow_path.read_text(encoding="utf-8").replace("\r\n", "\n")

          def require(pattern: str, message: str) -> re.Match[str]:
            match = re.search(pattern, workflow, flags=re.MULTILINE)
            if match is None:
              print(message, file=sys.stderr)
              sys.exit(1)
            return match

          if re.search(r"(?m)^  workflow_dispatch:", workflow):
            print("sync wrapper must not define workflow_dispatch", file=sys.stderr)
            sys.exit(1)

          if re.search(r"(?m)^  pull_request(_target)?:", workflow):
            print("sync wrapper must not define pull_request-style triggers", file=sys.stderr)
            sys.exit(1)

          if re.search(r"(?m)^ {4}(runs-on|steps|container|env|permissions):", workflow):
            print("sync wrapper must stay a thin reusable-workflow wrapper", file=sys.stderr)
            sys.exit(1)

          if "actions/checkout@" in workflow:
            print("sync wrapper must not inline checkout steps", file=sys.stderr)
            sys.exit(1)

          if "secrets: inherit" in workflow:
            print("sync wrapper must map only RUNLIX_APP_ID and RUNLIX_PRIVATE_KEY", file=sys.stderr)
            sys.exit(1)

          require(r"(?m)^name: Sync Release Record$", "sync wrapper name drifted")
          require(
            r"^on:\n"
            r"  workflow_run:\n"
            r"    workflows:\n"
            r"      - Release\n"
            r"    branches:\n"
            r"      - release\n"
            r"    types:\n"
            r"      - completed\n",
            "sync wrapper trigger must stay workflow_run -> Release/release/completed",
          )
          require(
            r"^permissions:\n"
            r"  actions: read\n"
            r"  contents: write\n",
            "sync wrapper permissions must stay actions: read and contents: write",
          )

          job_match = require(
            r"^jobs:\n"
            r"  sync:\n"
            r"    concurrency:\n"
            r"      group: sync-release-record-\$\{\{ github\.repository \}\}\n"
            r"      cancel-in-progress: false\n"
            r"    uses: runlix/build-workflow/\.github/workflows/sync-release-record\.yml@(?P<workflow_sha>[0-9a-f]{40})\n"
            r"    with:\n"
            r"      tool-image: (?P<tool_image>ghcr\.io/runlix/build-workflow-tools@sha256:[0-9a-f]{64})\n"
            r"    secrets:\n"
            r"      RUNLIX_APP_ID: \$\{\{ secrets\.RUNLIX_APP_ID \}\}\n"
            r"      RUNLIX_PRIVATE_KEY: \$\{\{ secrets\.RUNLIX_PRIVATE_KEY \}\}\n?\Z",
            "sync wrapper job contract drifted",
          )

          print(
            json.dumps(
              {
                "workflow_path": str(workflow_path),
                "workflow_ref": job_match.group("workflow_sha"),
                "tool_image": job_match.group("tool_image"),
              },
              indent=2,
            )
          )
          PY

      - name: Summarize validated sync wrapper
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path("/tmp/validated-sync-wrapper.json").read_text(encoding="utf-8"))
          summary = "\n".join(
            [
              "## Sync Wrapper Validation",
              "",
              f"- Workflow path: `{payload['workflow_path']}`",
              f"- Reusable workflow ref: `{payload['workflow_ref']}`",
              f"- Tool image: `{payload['tool_image']}`",
            ]
          )
          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as handle:
            handle.write(summary + "\n")
          PY
