name: Validate Build

on:
  workflow_call:
    inputs:
      build-config-path:
        description: Maintainer override for contract fixtures.
        required: false
        default: .ci/build.json
        type: string
      tool-image:
        description: Immutable internal tool image tag matching the pinned reusable workflow commit.
        required: true
        type: string

concurrency:
  group: validate-build-${{ github.repository }}-${{ github.ref }}-${{ inputs.build-config-path }}
  cancel-in-progress: true

jobs:
  plan:
    name: plan
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    container:
      image: ${{ inputs.tool-image }}
    outputs:
      enabled_count: ${{ steps.validate.outputs.enabled_count }}
      image_name: ${{ steps.validate.outputs.image_name }}
      manifest_tags: ${{ steps.validate.outputs.manifest_tags }}
      matrix: ${{ steps.plan.outputs.matrix }}
      short_sha: ${{ steps.context.outputs.short_sha }}
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Resolve source context
        id: context
        shell: bash
        run: |
          set -euo pipefail
          printf 'short_sha=%s\n' "${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Validate build config
        id: validate
        shell: bash
        env:
          BUILD_CONFIG_PATH: ${{ inputs.build-config-path }}
        run: |
          set -euo pipefail

          build-workflow-ci validate-config "$BUILD_CONFIG_PATH" > /tmp/validate-config.json

          {
            printf 'image_name=%s\n' "$(jq -r '.image_name' /tmp/validate-config.json)"
            printf 'version=%s\n' "$(jq -r '.version // ""' /tmp/validate-config.json)"
            printf 'enabled_count=%s\n' "$(jq -r '.enabled_count' /tmp/validate-config.json)"
            printf 'manifest_tags=%s\n' "$(jq -c '.manifest_tags' /tmp/validate-config.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Plan build matrix
        id: plan
        shell: bash
        env:
          BUILD_CONFIG_PATH: ${{ inputs.build-config-path }}
          SHORT_SHA: ${{ steps.context.outputs.short_sha }}
        run: |
          set -euo pipefail

          build-workflow-ci plan-matrix "$BUILD_CONFIG_PATH" --short-sha "$SHORT_SHA" > /tmp/plan-matrix.json
          printf 'matrix=%s\n' "$(jq -c . /tmp/plan-matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    name: build (${{ matrix.name }})
    permissions:
      contents: read
    needs:
      - plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Plan target build
        id: plan-build
        shell: bash
        env:
          BUILD_CONFIG_PATH: ${{ inputs.build-config-path }}
          SHORT_SHA: ${{ needs.plan.outputs.short_sha }}
          TARGET_NAME: ${{ matrix.name }}
          TOOL_IMAGE: ${{ inputs.tool-image }}
        run: |
          set -euo pipefail

          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$TOOL_IMAGE" \
            plan-build-target "$BUILD_CONFIG_PATH" \
            --target-name "$TARGET_NAME" \
            --mode pr \
            --short-sha "$SHORT_SHA" \
            > /tmp/build-target-plan.json

          {
            printf 'image_tag=%s\n' "$(jq -r '.image_tag' /tmp/build-target-plan.json)"
            printf 'platform=%s\n' "$(jq -r '.platform' /tmp/build-target-plan.json)"
            printf 'test_script=%s\n' "$(jq -r '.test // ""' /tmp/build-target-plan.json)"
            printf 'dockerfile=%s\n' "$(jq -r '.dockerfile' /tmp/build-target-plan.json)"
            printf 'context_dir=%s\n' "$(jq -r '.context_dir' /tmp/build-target-plan.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Render build-push inputs
        id: build-inputs
        shell: bash
        run: |
          set -euo pipefail

          {
            echo 'build_args<<EOF'
            jq -r '.build_args | to_entries[]? | "\(.key)=\(.value)"' /tmp/build-target-plan.json
            echo 'EOF'
            echo 'labels<<EOF'
            jq -r '.labels | to_entries[]? | "\(.key)=\(.value)"' /tmp/build-target-plan.json
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build target
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          build-args: ${{ steps.build-inputs.outputs.build_args }}
          context: ${{ steps.plan-build.outputs.context_dir }}
          file: ${{ steps.plan-build.outputs.dockerfile }}
          labels: ${{ steps.build-inputs.outputs.labels }}
          load: true
          platforms: ${{ steps.plan-build.outputs.platform }}
          tags: ${{ steps.plan-build.outputs.image_tag }}

      - name: Run target test
        if: ${{ steps.plan-build.outputs.test_script != '' }}
        timeout-minutes: 10
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.plan-build.outputs.image_tag }}
          PLATFORM: ${{ steps.plan-build.outputs.platform }}
          TEST_SCRIPT: ${{ steps.plan-build.outputs.test_script }}
        run: |
          set -euo pipefail

          chmod +x "$TEST_SCRIPT"
          "$TEST_SCRIPT"

  summary:
    name: summary
    permissions:
      contents: read
    needs:
      - plan
      - build
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Generate validation summary
        shell: bash
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          IMAGE_NAME: ${{ needs.plan.outputs.image_name }}
          MANIFEST_TAGS: ${{ needs.plan.outputs.manifest_tags }}
          MATRIX_JSON: ${{ needs.plan.outputs.matrix }}
          PLAN_RESULT: ${{ needs.plan.result }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHORT_SHA: ${{ needs.plan.outputs.short_sha }}
          TOOL_IMAGE: ${{ inputs.tool-image }}
        run: |
          set -euo pipefail

          {
            echo "## Validation Summary"
            echo ""
            echo "- Repository: \`$REPOSITORY\`"
            echo "- Commit: \`$SHORT_SHA\`"
            echo "- Plan result: \`$PLAN_RESULT\`"
            echo "- Build result: \`$BUILD_RESULT\`"
            echo "- Tool image: \`$TOOL_IMAGE\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$PLAN_RESULT" = "success" ] && [ -n "${MATRIX_JSON:-}" ]; then
            {
              echo ""
              echo "### Build Plan"
              echo ""
              echo "- Image: \`$IMAGE_NAME\`"
              echo "- Enabled targets: \`$(jq 'length' <<< "$MATRIX_JSON")\`"
              echo "- Manifest tags: \`$(jq -r 'join(", ")' <<< "$MANIFEST_TAGS")\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          {
            echo ""
            echo "[View workflow run]($RUN_URL)"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$PLAN_RESULT" != "success" ]; then
            echo "Validation or matrix planning failed." >&2
            exit 1
          fi

          if [ "$BUILD_RESULT" != "success" ]; then
            echo "One or more target builds or tests failed." >&2
            exit 1
          fi
