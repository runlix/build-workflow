name: CI v2 Sync Release Metadata

on:
  workflow_call:
    inputs:
      tooling-ref:
        description: Full build-workflow commit SHA used for internal action checkout. Callers should keep this equal to the reusable workflow ref in uses:.
        required: true
        type: string
      release-artifact-name:
        description: Artifact name used by the release workflow for release metadata.
        required: false
        default: release-metadata
        type: string
      release-branch:
        description: Primary release branch that should sync to main metadata.
        required: false
        default: release
        type: string
      main-branch:
        description: Primary main branch that should receive metadata updates.
        required: false
        default: main
        type: string
      alternate-release-branch:
        description: Optional secondary release branch used during side-branch rollout.
        required: false
        default: ""
        type: string
      alternate-main-branch:
        description: Optional secondary main branch paired with the alternate release branch.
        required: false
        default: ""
        type: string

permissions:
  actions: read
  contents: write

jobs:
  sync:
    if: ${{ github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == inputs.release-branch || (inputs.alternate-release-branch != '' && github.event.workflow_run.head_branch == inputs.alternate-release-branch)) }}
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve target branch
        id: target
        run: |
          if [ "${{ github.event.workflow_run.head_branch }}" = "${{ inputs.release-branch }}" ]; then
            echo "ref=${{ inputs.main-branch }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${{ inputs.alternate-main-branch }}" ]; then
            echo "alternate-main-branch must be set when alternate-release-branch is used" >&2
            exit 1
          fi

          echo "ref=${{ inputs.alternate-main-branch }}" >> "$GITHUB_OUTPUT"

      - name: Checkout metadata branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.target.outputs.ref }}

      - name: Checkout build workflow internals
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: runlix/build-workflow
          ref: ${{ inputs.tooling-ref }}
          path: .build-workflow
          persist-credentials: false

      - name: Download release metadata artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts
          gh run download "${{ github.event.workflow_run.id }}" \
            --repo "${{ github.repository }}" \
            --name "${{ inputs.release-artifact-name }}" \
            --dir artifacts
          jq empty artifacts/release-metadata.json > /dev/null

      - name: Write releases.json
        uses: ./.build-workflow/.github/actions/ci-v2/write-releases-json
        with:
          metadata-path: artifacts/release-metadata.json
          releases-path: releases.json

      - name: Commit metadata update
        env:
          SERVICE_NAME: ${{ github.event.repository.name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add releases.json

          if git diff --staged --quiet; then
            echo "No metadata changes to commit"
            exit 0
          fi

          version="$(jq -r '.version // ""' releases.json)"
          short_sha="$(jq -r '.short_sha' releases.json)"

          if [ -n "$version" ]; then
            git commit -m "Release: ${SERVICE_NAME} ${version} @ ${short_sha}"
          else
            git commit -m "Release: ${SERVICE_NAME} @ ${short_sha}"
          fi

          git push origin "HEAD:${{ steps.target.outputs.ref }}"
