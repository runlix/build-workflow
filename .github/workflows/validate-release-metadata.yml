name: Validate Release Metadata

on:
  workflow_call:
    inputs:
      release-json-path:
        description: Path to the caller release.json file.
        required: false
        default: release.json
        type: string

jobs:
  validate:
    name: validate
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/runlix/build-workflow-tools:sha-${{ github.workflow_sha }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Validate release.json contract
        shell: bash
        env:
          RELEASE_JSON_PATH: ${{ inputs.release-json-path }}
        run: |
          set -euo pipefail

          [ -f "$RELEASE_JSON_PATH" ] || {
            echo "release.json file not found: $RELEASE_JSON_PATH" >&2
            exit 1
          }

          build-workflow-ci validate-release-json "$RELEASE_JSON_PATH"

      - name: Summarize validated release.json
        shell: bash
        env:
          RELEASE_JSON_PATH: ${{ inputs.release-json-path }}
        run: |
          set -euo pipefail

          {
            echo "## Release Metadata Validation"
            echo ""
            echo "- release.json path: \`$RELEASE_JSON_PATH\`"
            echo "- Tool image: \`ghcr.io/runlix/build-workflow-tools:sha-${{ github.workflow_sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
