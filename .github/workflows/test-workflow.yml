# Test Workflow for build-images-rebuild.yml
# Tests the reusable workflow with test fixtures

name: Test Build Workflow

on:
  pull_request:
    paths:
      - '.github/workflows/build-images-rebuild.yml'
      - '.github/workflows/test-workflow.yml'
      - 'examples/**'
      - 'test-fixtures/**'
      - 'schema/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-images-rebuild.yml'
      - '.github/workflows/test-workflow.yml'
      - 'examples/**'
      - 'test-fixtures/**'
      - 'schema/**'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of test to run'
        required: true
        default: 'both'
        type: choice
        options:
          - base-image
          - service
          - both

permissions:
  contents: read

jobs:
  validate-config-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'

      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Validate schema structure
        run: |
          echo "Validating schema structure..."
          ajv compile -s schema/docker-matrix-schema.json --strict=false

      - name: Validate all example files
        run: |
          echo "Validating examples and test fixtures..."
          for file in examples/v1/base-image-matrix.json examples/v1/service-matrix.json test-fixtures/v1/base-image/docker-matrix.json test-fixtures/v1/service/docker-matrix.json; do
            echo "  Checking $file"
            ajv validate -s schema/docker-matrix-schema.json -d "$file" --strict=false
          done

      - name: Validate tag rendering contract
        run: |
          set -euo pipefail

          echo "Validating manifest and base tag rendering..."
          for file in examples/v1/base-image-matrix.json examples/v1/service-matrix.json test-fixtures/v1/base-image/docker-matrix.json test-fixtures/v1/service/docker-matrix.json; do
            VERSION=$(jq -r '.version // ""' "$file")
            BASE_TAG=$(jq -r '.base_image.tag // ""' "$file")

            jq -c '.variants[]' "$file" | while read -r variant; do
              NAME=$(echo "$variant" | jq -r '.name')
              SUFFIX=$(echo "$variant" | jq -r '.tag_suffix')

              if [[ "$SUFFIX" == -* ]]; then
                echo "Suffix for $file / $NAME must not start with '-'"
                exit 1
              fi

              if [ -z "$VERSION" ] && [ -z "$SUFFIX" ]; then
                echo "Versionless config $file / $NAME must use a non-empty tag_suffix"
                exit 1
              fi

              if [ -n "$VERSION" ]; then
                MANIFEST_TAG="$VERSION"
                if [ -n "$SUFFIX" ]; then
                  MANIFEST_TAG="${VERSION}-${SUFFIX}"
                fi
              else
                MANIFEST_TAG="$SUFFIX"
              fi

              if [[ "$MANIFEST_TAG" == *"--"* ]] || [[ "$MANIFEST_TAG" == *- ]]; then
                echo "Invalid manifest tag rendered for $file / $NAME: $MANIFEST_TAG"
                exit 1
              fi

              if [ -n "$BASE_TAG" ]; then
                INJECTED_BASE_TAG="$BASE_TAG"
                if [ -n "$SUFFIX" ]; then
                  INJECTED_BASE_TAG="${BASE_TAG}-${SUFFIX}"
                fi

                if [[ "$INJECTED_BASE_TAG" == *"--"* ]] || [[ "$INJECTED_BASE_TAG" == *- ]]; then
                  echo "Invalid injected base tag rendered for $file / $NAME: $INJECTED_BASE_TAG"
                  exit 1
                fi
              fi
            done
          done

      - name: Verify workflow permission contract
        run: |
          python - <<'PY'
          import pathlib
          import re

          workflow = pathlib.Path(".github/workflows/test-workflow.yml").read_text()
          header, jobs = workflow.split("jobs:", 1)
          _, remainder = jobs.split("\n  test-base-image:", 1)
          base_job, remainder = remainder.split("\n  test-service:", 1)
          service_job, summary_job = remainder.split("\n  test-summary:", 1)

          assert "- '.github/workflows/test-workflow.yml'" in header
          assert header.count("- '.github/workflows/test-workflow.yml'") == 2
          assert re.search(r"^permissions:\n  contents: read\n$", header, re.M), header
          assert "packages: write" not in header
          assert "docker/login-action@" not in base_job
          assert "docker/login-action@" not in service_job
          assert "docker/login-action@" not in summary_job
          assert "ghcr.io/" not in base_job
          assert "ghcr.io/" not in service_job
          assert "--push" not in base_job
          assert "--push" not in service_job
          assert "--load" in base_job
          assert "--load" in service_job
          PY

  # Test with base image configuration
  test-base-image:
    needs: validate-config-contracts
    if: github.event_name != 'workflow_dispatch' || inputs.test_type == 'base-image' || inputs.test_type == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Copy test fixtures to root
        run: |
          # Copy base image test fixtures to expected location
          mkdir -p .ci
          cp test-fixtures/v1/base-image/docker-matrix.json .ci/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build base image (AMD64)
        run: |
          echo "Building base image for AMD64..."
          docker buildx build \
            --platform linux/amd64 \
            -f test-fixtures/v1/base-image/Dockerfile.amd64 \
            --build-arg UPSTREAM_IMAGE=gcr.io/distroless/base-debian12 \
            --build-arg UPSTREAM_TAG=latest \
            --build-arg UPSTREAM_DIGEST=sha256:347a41e7f263ea7f7aba1735e5e5b1439d9e41a9f09179229f8c13ea98ae94cf \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --load \
            -t test-base-image:test-amd64 \
            .

      - name: Test base image
        run: |
          export IMAGE_TAG="test-base-image:test-amd64"
          ./test-fixtures/v1/base-image/test.sh

      - name: Build debug base image (AMD64)
        run: |
          echo "Building debug base image for AMD64..."
          docker buildx build \
            --platform linux/amd64 \
            -f test-fixtures/v1/base-image/Dockerfile.debug.amd64 \
            --build-arg UPSTREAM_IMAGE=gcr.io/distroless/base-debian12 \
            --build-arg UPSTREAM_TAG=debug \
            --build-arg UPSTREAM_DIGEST=sha256:e8075f7da06319e4ac863d31fa11354003c809ef9f1b52fe32ef39e876ac16c5 \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --load \
            -t test-base-image:test-debug-amd64 \
            .

      - name: Test debug base image
        run: |
          export IMAGE_TAG="test-base-image:test-debug-amd64"
          ./test-fixtures/v1/base-image/test-debug.sh

  # Test with service configuration
  test-service:
    needs: validate-config-contracts
    if: github.event_name != 'workflow_dispatch' || inputs.test_type == 'service' || inputs.test_type == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Copy test fixtures to root
        run: |
          # Copy service test fixtures to expected location
          mkdir -p .ci
          cp test-fixtures/v1/service/docker-matrix.json .ci/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build service image (AMD64)
        run: |
          echo "Building service image for AMD64..."
          docker buildx build \
            --platform linux/amd64 \
            -f test-fixtures/v1/service/Dockerfile.amd64 \
            --build-arg BASE_IMAGE=gcr.io/distroless/base-debian12 \
            --build-arg BASE_TAG=latest \
            --build-arg BASE_DIGEST=sha256:347a41e7f263ea7f7aba1735e5e5b1439d9e41a9f09179229f8c13ea98ae94cf \
            --build-arg APP_VERSION=1.2.3 \
            --build-arg APP_USER=testapp \
            --build-arg APP_PORT=8080 \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.version=v1.2.3" \
            --load \
            -t test-service:v1.2.3-amd64 \
            .

      - name: Test service image
        run: |
          export IMAGE_TAG="test-service:v1.2.3-amd64"
          ./test-fixtures/v1/service/test.sh

      - name: Build debug service image (AMD64)
        run: |
          echo "Building debug service image for AMD64..."
          docker buildx build \
            --platform linux/amd64 \
            -f test-fixtures/v1/service/Dockerfile.debug.amd64 \
            --build-arg BASE_IMAGE=gcr.io/distroless/base-debian12 \
            --build-arg BASE_TAG=debug \
            --build-arg BASE_DIGEST=sha256:e8075f7da06319e4ac863d31fa11354003c809ef9f1b52fe32ef39e876ac16c5 \
            --build-arg APP_VERSION=1.2.3 \
            --build-arg APP_USER=testapp \
            --build-arg APP_PORT=8080 \
            --build-arg DEBUG_ENABLED=true \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.version=v1.2.3" \
            --load \
            -t test-service:v1.2.3-debug-amd64 \
            .

      - name: Test debug service image
        run: |
          export IMAGE_TAG="test-service:v1.2.3-debug-amd64"
          ./test-fixtures/v1/service/test-debug.sh

  # Summary job
  test-summary:
    needs: [validate-config-contracts, test-base-image, test-service]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check test results
        run: |
          echo "Test Results:"
          echo "============="
          echo "Config Contracts: ${{ needs.validate-config-contracts.result }}"
          echo "Base Image: ${{ needs.test-base-image.result }}"
          echo "Service: ${{ needs.test-service.result }}"

          if [ "${{ needs.validate-config-contracts.result }}" != "success" ] || [ "${{ needs.test-base-image.result }}" != "success" ] || [ "${{ needs.test-service.result }}" != "success" ]; then
            echo ""
            echo "❌ Some tests failed"
            exit 1
          fi

          echo ""
          echo "✅ All tests passed"
