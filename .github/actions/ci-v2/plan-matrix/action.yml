name: Plan CI v2 Matrix
description: Expand a CI v2 config file into a build matrix.

inputs:
  config-path:
    description: Path to the CI v2 config file.
    required: true
  short-sha:
    description: Short commit SHA used for PR and temporary release tags.
    required: true

outputs:
  matrix:
    description: JSON matrix for downstream jobs.
    value: ${{ steps.plan.outputs.matrix }}

runs:
  using: composite
  steps:
    - name: Plan matrix
      id: plan
      shell: bash
      run: |
        matrix="$(
          bash "${{ github.action_path }}/../../../../prototypes/ci-v2/scripts/plan-matrix.sh" \
            "${{ inputs.config-path }}" \
            "${{ inputs.short-sha }}"
        )"
        echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
