name: Validate CI v2 Config
description: Validate a CI v2 config file and the files it references.

inputs:
  config-path:
    description: Path to the CI v2 config file.
    required: true

runs:
  using: composite
  steps:
    - name: Validate config
      shell: bash
      run: |
        bash "${{ github.action_path }}/../../../../prototypes/ci-v2/scripts/validate-config.sh" \
          "${{ inputs.config-path }}"
