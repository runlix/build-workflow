name: Render CI v2 Release Metadata
description: Render release metadata JSON for a CI v2 release.

inputs:
  config-path:
    description: Path to the CI v2 config file.
    required: true
  source-sha:
    description: Full source commit SHA for the release.
    required: true
  published-at:
    description: RFC3339 UTC timestamp for the release publication time.
    required: true
  output-path:
    description: Path where the rendered release metadata JSON will be written.
    required: false
    default: release-metadata.json

outputs:
  metadata-path:
    description: Path to the rendered release metadata file.
    value: ${{ steps.render.outputs.metadata-path }}

runs:
  using: composite
  steps:
    - name: Render metadata
      id: render
      shell: bash
      run: |
        bash "${{ github.action_path }}/../../../prototypes/ci-v2/scripts/render-release-metadata.sh" \
          "${{ inputs.config-path }}" \
          "${{ inputs.source-sha }}" \
          "${{ inputs.published-at }}" > "${{ inputs.output-path }}"
        jq empty "${{ inputs.output-path }}" > /dev/null
        echo "metadata-path=${{ inputs.output-path }}" >> "$GITHUB_OUTPUT"
