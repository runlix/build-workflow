name: Build CI v2 Target
description: Build one CI v2 target for PR validation or release publishing.

inputs:
  config-path:
    description: Path to the CI v2 config file.
    required: true
  target-name:
    description: Name of the enabled target to build.
    required: true
  mode:
    description: Build mode, either pr or release.
    required: true
  short-sha:
    description: Short commit SHA used for PR and temporary release tags.
    required: true
  context-dir:
    description: Docker build context directory.
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: Build target
      shell: bash
      run: |
        bash "${{ github.action_path }}/run.sh" \
          "${{ inputs.config-path }}" \
          "${{ inputs.target-name }}" \
          "${{ inputs.mode }}" \
          "${{ inputs.short-sha }}" \
          "${{ inputs.context-dir }}"
