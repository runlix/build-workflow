name: Create CI Manifests
description: Publish multi-architecture manifests for a CI config file.

inputs:
  config-path:
    description: Path to the CI config file.
    required: true
  short-sha:
    description: Short commit SHA used in temporary platform image tags.
    required: true
  output-file:
    description: Optional file that records the manifest tags that were created.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Create manifests
      shell: bash
      run: |
        if [ -n "${{ inputs.output-file }}" ]; then
          bash "${{ github.action_path }}/run.sh" \
            "${{ inputs.config-path }}" \
            "${{ inputs.short-sha }}" \
            "${{ inputs.output-file }}"
        else
          bash "${{ github.action_path }}/run.sh" \
            "${{ inputs.config-path }}" \
            "${{ inputs.short-sha }}"
        fi
