name: Plan CI Matrix
description: Expand a CI config file into a build matrix.

inputs:
  config-path:
    description: Path to the CI config file.
    required: true
  short-sha:
    description: Short commit SHA used for PR and temporary release tags.
    required: true

outputs:
  matrix:
    description: JSON matrix for downstream jobs.
    value: ${{ steps.plan.outputs.matrix }}

runs:
  using: composite
  steps:
    - name: Plan matrix
      id: plan
      shell: bash
      run: |
        matrix="$(
          bash "${{ github.action_path }}/run.sh" \
            "${{ inputs.config-path }}" \
            "${{ inputs.short-sha }}"
        )"
        printf 'matrix=%s\n' "$matrix" >> "$GITHUB_OUTPUT"
