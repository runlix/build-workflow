name: Write releases.json
description: Flatten release metadata into the main-branch releases.json format.

inputs:
  metadata-path:
    description: Path to the release metadata JSON artifact.
    required: true
  releases-path:
    description: Path to the releases.json file to write.
    required: true

outputs:
  releases-path:
    description: Path to the written releases.json file.
    value: ${{ steps.write.outputs.releases-path }}

runs:
  using: composite
  steps:
    - name: Write releases.json
      id: write
      shell: bash
      run: |
        bash "${{ github.action_path }}/run.sh" \
          "${{ inputs.metadata-path }}" \
          "${{ inputs.releases-path }}"
        printf 'releases-path=%s\n' "${{ inputs.releases-path }}" >> "$GITHUB_OUTPUT"
