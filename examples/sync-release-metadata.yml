name: Sync Release Metadata

on:
  workflow_run:
    workflows:
      - Release
    branches:
      - release
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  sync:
    # Pin to a merged full SHA from runlix/build-workflow.
    uses: runlix/build-workflow/.github/workflows/sync-release-metadata-v2.yml@YOUR_BUILD_WORKFLOW_SHA
