name: Sync Release Record

on:
  workflow_run:
    workflows:
      - Release
    branches:
      - release
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  sync:
    concurrency:
      group: sync-release-record-${{ github.repository }}
      cancel-in-progress: false
    uses: runlix/build-workflow/.github/workflows/sync-release-record.yml@YOUR_BUILD_WORKFLOW_SHA
    with:
      tool-image: ghcr.io/runlix/build-workflow-tools@sha256:YOUR_TOOL_IMAGE_DIGEST
    secrets:
      RUNLIX_APP_ID: ${{ secrets.RUNLIX_APP_ID }}
      RUNLIX_PRIVATE_KEY: ${{ secrets.RUNLIX_PRIVATE_KEY }}
