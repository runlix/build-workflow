name: Validate Release Metadata

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "README.md"
      - "links.json"
      - "release.json"
      - "renovate.json"
      - ".github/workflows/validate-release-metadata.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-release-metadata:
    name: validate-release-metadata
    uses: runlix/build-workflow/.github/workflows/validate-release-metadata.yml@YOUR_BUILD_WORKFLOW_SHA
    with:
      release-json-path: release.json
      tool-image: ghcr.io/runlix/build-workflow-tools:sha-YOUR_BUILD_WORKFLOW_SHA
