name: Release

on:
  push:
    branches:
      - release
    paths:
      - ".ci/config.json"
      - ".ci/README.md"
      - "linux-*.Dockerfile"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  release:
    # Pin to a merged full SHA from runlix/build-workflow.
    uses: runlix/build-workflow/.github/workflows/release-v2.yml@YOUR_BUILD_WORKFLOW_SHA
