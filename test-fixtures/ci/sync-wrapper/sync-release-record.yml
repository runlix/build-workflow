name: Sync Release Record

on:
  workflow_run:
    workflows:
      - Release
    branches:
      - release
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  sync:
    concurrency:
      group: sync-release-record-${{ github.repository }}
      cancel-in-progress: false
    uses: runlix/build-workflow/.github/workflows/sync-release-record.yml@d93b3a9c7e6fcb970e0f8f4ef5febca6ed16a6fc
    with:
      tool-image: ghcr.io/runlix/build-workflow-tools@sha256:f373dff1cd20aa42e1cb38cce316bfec6d9f62c663d8de9f7add8ecc751f025a
    secrets:
      RUNLIX_APP_ID: ${{ secrets.RUNLIX_APP_ID }}
      RUNLIX_PRIVATE_KEY: ${{ secrets.RUNLIX_PRIVATE_KEY }}
