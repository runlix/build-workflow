name: PR Validation

on:
  pull_request:
    branches:
      - release
    paths:
      - ".ci/config.json"
      - ".ci/smoke-test.sh"
      - "linux-*.Dockerfile"
      - ".github/workflows/pr-validation.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: pr-validation-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      short_sha: ${{ steps.context.outputs.short_sha }}
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout build workflow tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: runlix/build-workflow
          ref: main
          path: .tooling

      - name: Resolve source context
        id: context
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Validate CI config
        run: .tooling/prototypes/ci-v2/scripts/validate-config.sh .ci/config.json

      - name: Plan build matrix
        id: plan
        run: |
          short_sha="${{ steps.context.outputs.short_sha }}"
          echo "matrix=$(.tooling/prototypes/ci-v2/scripts/plan-matrix.sh .ci/config.json "$short_sha")" >> "$GITHUB_OUTPUT"

  build-test:
    needs: plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout build workflow tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: runlix/build-workflow
          ref: main
          path: .tooling

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build target
        run: |
          .tooling/prototypes/ci-v2/scripts/build-target.sh \
            .ci/config.json \
            "${{ matrix.name }}" \
            pr \
            "${{ needs.plan.outputs.short_sha }}"

      - name: Run smoke test
        if: ${{ matrix.test != '' }}
        env:
          IMAGE_TAG: ${{ matrix.image }}:${{ matrix.pr_local_tag }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          chmod +x "${{ matrix.test }}"
          "${{ matrix.test }}"
